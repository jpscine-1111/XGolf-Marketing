// ---- TAB: FOLLOW-UP QUEUE (active leads that were never worked, or worked too late) ----
// Queue membership = active Lead Status AND first contact never happened or landed >7 days after
// inquiry. Age ("days since inquiry") is measured against the CURRENT date, not the export date,
// because an untouched lead keeps aging while the export sits still — that gap is the point.
const FU_PRIO=[{min:90,cls:"p90",label:"90+ days"},{min:30,cls:"p30",label:"30–90 days"},
               {min:7,cls:"p7",label:"7–30 days"},{min:-Infinity,cls:"p0",label:"Under 7 days"}];
const fuBand=d=>FU_PRIO.find(b=>d>=b.min);
const fuToday=()=>Math.floor(Date.now()/86400000);
const fuAge=r=>fuToday()-r.inqDay;
// Late = eventually contacted, but not within the 7-day window. Never = no First Contacted date.
const fuQueue=()=>FOLLOWUP.filter(r=>r.respDays==null||r.respDays>7);
const FU_BAND_COLOR={p90:"#ff5252",p30:"#ff8c42",p7:"#ffb020",p0:"#00e676"};

// ---- State accordion (same structure as the Lead Pipeline dashboard's Follow-Up Queue) ----
// One collapsible group per state, ordered most-at-risk first; expanding a state lists its leads
// oldest-first. Open groups and page positions survive a re-render so a rebuild doesn't collapse
// everything the user opened.
const QS_PAGE_SIZE=25;
const _qOpen=new Set();  // state IDs currently expanded
const _qPages={};        // current page index per state ID
let FU_GROUPS=[];
const qsId=s=>s.replace(/[^a-zA-Z0-9]/g,"_");
// Group the queue by state; leads oldest-first within each, states by most at-risk (90+ days).
function fuGroups(){
  const m={};
  fuQueue().forEach(r=>{ const s=r.state||"(no state recorded)"; (m[s]||(m[s]=[])).push(r); });
  return Object.entries(m).map(([state,leads])=>{
    leads.sort((a,b)=>fuAge(b)-fuAge(a)||a.name.localeCompare(b.name));
    return {state, sid:qsId(state), leads, total:leads.length,
      atRisk:leads.filter(r=>fuAge(r)>=90).length};
  }).sort((a,b)=>b.atRisk-a.atRisk||b.total-a.total||a.state.localeCompare(b.state));
}
function qsLeadRow(r){
  const d=fuAge(r), b=fuBand(d);
  const rowBg = b.cls==="p90"?"background:rgba(255,82,82,.09)"
    : b.cls==="p30"?"background:rgba(255,140,66,.07)"
    : b.cls==="p7"?"background:rgba(255,176,32,.05)" : "";
  return `<tr style="${rowBg}">
    <td class="prio" style="border-left-color:${FU_BAND_COLOR[b.cls]}"><b>${r.name}</b></td>
    <td>${r.city||"—"}</td>
    <td>${r.status}</td>
    <td style="color:${FU_BAND_COLOR[b.cls]};font-weight:600">${fmtNum(d)}${b.cls==="p90"?" ⚠":""}</td>
    <td>${r.src}</td>
    <td>${r.rating||"—"}</td>
  </tr>`;
}
function renderQStatePage(sid,page){
  const grp=FU_GROUPS.find(g=>g.sid===sid); if(!grp) return;
  const body=document.getElementById("qsb-"+sid); if(!body) return;
  _qPages[sid]=page;
  const total=grp.total, pages=Math.ceil(total/QS_PAGE_SIZE);
  const slice=grp.leads.slice(page*QS_PAGE_SIZE,(page+1)*QS_PAGE_SIZE);
  body.innerHTML=`<div class="tbl-scroll"><table class="tbl">
      <thead><tr><th>Name</th><th>City</th><th>Status</th><th>Days Since Inquiry</th><th>Lead Source</th><th>Lead Rating</th></tr></thead>
      <tbody>${slice.map(qsLeadRow).join("")}</tbody></table></div>`
    + (total>QS_PAGE_SIZE?`<div class="qs-pgbar">
        <button class="qs-pgbtn" onclick="renderQStatePage('${sid}',${page-1})" ${page===0?"disabled":""}>← Prev</button>
        <span>Page ${page+1} of ${pages} · ${fmtNum(total)} leads</span>
        <button class="qs-pgbtn" onclick="renderQStatePage('${sid}',${page+1})" ${page>=pages-1?"disabled":""}>Next →</button>
      </div>`:"");
}
function toggleQState(sid){
  const body=document.getElementById("qsb-"+sid), hdr=document.getElementById("qsh-"+sid);
  if(!body) return;
  const opening=body.style.display==="none";
  body.style.display=opening?"block":"none";
  if(hdr) hdr.classList.toggle("open",opening);
  if(opening){ _qOpen.add(sid); renderQStatePage(sid,_qPages[sid]||0); }
  else _qOpen.delete(sid);
}
function renderFuAccordion(){
  const wrap=document.getElementById("fuStatesAcc"); if(!wrap) return;
  FU_GROUPS=fuGroups();
  Object.keys(_qPages).forEach(sid=>{ if(!FU_GROUPS.find(g=>g.sid===sid)) delete _qPages[sid]; });
  if(!FU_GROUPS.length){ wrap.innerHTML=`<div style="text-align:center;color:var(--dim);padding:36px">No leads need follow-up</div>`; return; }
  wrap.innerHTML=FU_GROUPS.map(g=>{
    const open=_qOpen.has(g.sid);
    const risk=g.atRisk>0?`<span class="qs-pill qs-pill-risk">⚠ ${g.atRisk} at risk</span>`
                         :`<span class="qs-pill qs-pill-ok">✓ all fresh</span>`;
    return `<div class="qs-group">
      <div class="qs-hdr${open?" open":""}" id="qsh-${g.sid}" onclick="toggleQState('${g.sid}')">
        <span class="qs-caret">▶</span>
        <span class="qs-name">${g.state}</span>
        <span class="qs-pill qs-pill-tot">${g.total} lead${g.total!==1?"s":""}</span>
        ${risk}
      </div>
      <div class="qs-body" id="qsb-${g.sid}" style="display:${open?"block":"none"}"></div>
    </div>`;
  }).join("");
  FU_GROUPS.forEach(g=>{ if(_qOpen.has(g.sid)) renderQStatePage(g.sid,_qPages[g.sid]||0); });
}
function buildFollowup(){
  const p=document.getElementById("tab9");
  if(!FOLLOWUP.length){ p.innerHTML=`<div class="tab-head"><h2>Follow-Up Queue</h2><p>No active leads in the current CRM data.</p></div>`; return; }
  const Q=fuQueue();
  const never=Q.filter(r=>r.respDays==null).sort((a,b)=>a.inqDay-b.inqDay);
  const late=Q.filter(r=>r.respDays!=null);
  const ages=Q.map(fuAge);
  const oldest=never.length?fuAge(never[0]):0;
  const oldestAny=ages.length?Math.max(...ages):0;
  const medianAge=ages.length?[...ages].sort((a,b)=>a-b)[Math.floor(ages.length/2)]:0;
  const dayStr=d=>{const dt=new Date(d*86400000);return MONTH_NAMES[dt.getUTCMonth()]+" "+dt.getUTCDate()+", "+dt.getUTCFullYear();};

    o.n++; if(r.respDays==null)o.never++;});

     <div class="kpi warn"><div class="label">Not Contacted Within 7 Days</div><div class="val">${fmtNum(late.length)}</div><div class="sub">reached, but ${late.length?"after "+Math.round(sum(late.map(r=>r.respDays))/late.length)+" days on average":"—"}</div></div>
     <div class="kpi bad"><div class="label">Never Contacted</div><div class="val r">${fmtNum(never.length)}</div><div class="sub">no First Contacted date on record</div></div>
     <div class="kpi bad"><div class="label">Oldest Uncontacted Lead</div><div class="val r">${fmtNum(oldest)} days</div><div class="sub">${never.length?"inquired "+dayStr(never[0].inqDay):"—"}</div></div>
   </div>
   <div class="grid2">
     <div class="card"><h3>Queue by Priority</h3><p class="csub">The ${fmtNum(Q.length)} leads needing follow-up, banded by how long ago they inquired</p><div id="fuPrio"></div>
       <div class="legend">${FU_PRIO.map(b=>`<div class="item"><span class="swatch" style="background:${FU_BAND_COLOR[b.cls]}"></span>${b.label}</div>`).join("")}</div>
     </div>
     <div class="card"><h3>Queue by Pipeline Stage</h3><p class="csub">Which active stages the un-worked leads are sitting in</p><div id="fuStatus"></div>
       <div class="note"><b>Read:</b> The queue is not a pile of cold web forms — <b>${byStatus[0].s}</b> alone holds <b>${fmtNum(byStatus[0].n)}</b> of the ${fmtNum(Q.length)} leads. These are records a rep already classified as live and then stopped working, which is why the median lead here has been waiting <b>${fmtNum(medianAge)} days</b>.</div>

   </div>
   <div class="card">
     <h3>Priority Queue by State</h3><p class="csub">All ${fmtNum(Q.length)} active leads needing follow-up, grouped by state and ordered most at-risk first — click a state to expand its leads, oldest inquiry first</p>
     <div class="legend" style="margin:0 0 12px">${FU_PRIO.map(b=>`<div class="item"><span class="swatch" style="background:${FU_BAND_COLOR[b.cls]}"></span>${b.label}${b.cls==="p90"?" ⚠ at risk":""}</div>`).join("")}</div>
     <div class="qs-wrap" id="fuStatesAcc"></div>
     <div class="note">A lead enters this queue when its First Contacted date is blank or lands more than 7 days after Inquiry Date. Each state's <b>at risk</b> count is its leads 90+ days past inquiry. Latest inquiry anywhere in this export is <b>${dayStr(asOf)}</b>, so every lead here is already at least <b>${fmtNum(Math.min(...ages))} days</b> old${bands[3].n===0?` and the "under 7 days" band is empty — the queue holds no fresh leads, only backlog`:""}.</div>

   <div class="card">

   <div class="card">

       <tbody>${stRows.map(o=>`<tr><td>${o.s}</td><td>${fmtNum(o.n)}</td><td>${fmtNum(o.never)}</td><td>${fmtPct(o.n/Q.length*100,1)}</td></tr>`).join("")}</tbody>
     </table></div>

   </div>`;

  catBarChart(document.getElementById("fuPrio"),{
    cats:bands.map(b=>({label:b.label,full:b.label,value:b.n,color:FU_BAND_COLOR[b.cls]})),

    items:byStatus.map((o,i)=>({name:o.s,value:o.n,color:CHANNEL_COLORS[i%CHANNEL_COLORS.length]})),valFmt:v=>fmtNum(v)});

    items:stTop.map(o=>({name:o.s,value:o.n,color:stColor(o),suffix:` · ${o.never} never`})),valFmt:v=>fmtNum(v)});
  renderFuAccordion();

// ---- TAB: SEASONAL PATTERNS ----
function buildSeasonal(){
  const p=document.getElementById("tab6");
  const R=RESPONSE;
  const monTotal=k=>Object.values(spendStore[k]||{}).reduce((a,v)=>a+(typeof v==="number"?v:0),0);

  // ---- Lead volume by month-of-year (average across every year present in Export.xlsx) ----
  const lSum=Array(12).fill(0), lCnt=Array(12).fill(0);
  Object.keys(R.monthly).forEach(k=>{const m=+k.split("-")[1]; lSum[m-1]+=R.monthly[k].total; lCnt[m-1]++;});
  const leadAvg=lSum.map((s,i)=>lCnt[i]?s/lCnt[i]:0);
  const leadYears=[...new Set(Object.keys(R.monthly).map(k=>+k.split("-")[0]))].sort();
  const validM=[...Array(12).keys()].filter(i=>lCnt[i]>0);
  if(!validM.length){p.innerHTML=`<div class="tab-head"><h2>Seasonal Patterns</h2><p>No monthly lead data available.</p></div>`;return;}
  const meanLead=sum(validM.map(i=>leadAvg[i]))/validM.length;
  const peakLeadI=validM.reduce((a,b)=>leadAvg[b]>leadAvg[a]?b:a);
  const slowLeadI=validM.reduce((a,b)=>leadAvg[b]<leadAvg[a]?b:a);

  // ---- Target-year (2025) spend + leads, month by month ----
  const spendYears=[...new Set(Object.keys(spendStore).map(k=>+k.split("-")[0]))].sort();
  const TY=spendYears.includes(2025)?2025:(spendYears[spendYears.length-1]||2025);
  const tyLeads=Array(12).fill(null), tySpend=Array(12).fill(null);
  for(let m=1;m<=12;m++){const k=mkKey(TY,m); if(R.monthly[k])tyLeads[m-1]=R.monthly[k].total; if(spendStore[k]!=null)tySpend[m-1]=monTotal(k);}
  const spendValid=[...Array(12).keys()].filter(i=>tySpend[i]!=null);
  const peakSpendI=spendValid.length?spendValid.reduce((a,b)=>tySpend[b]>tySpend[a]?b:a):null;
  const aligned=peakSpendI!=null&&Math.abs(peakSpendI-peakLeadI)<=1;

  // ---- Spend/demand shares + per-month alignment status (target year) ----
  const totLead=sum(tyLeads.map(v=>v||0))||1;
  const posSpend=tySpend.map(v=>(v!=null&&v>0)?v:0);
  const totSpend=sum(posSpend)||1;
  const status=[...Array(12)].map((_,i)=>{
    if(tyLeads[i]==null&&tySpend[i]==null)return{s:'na',delta:0,ls:0,ss:0};
    const ls=(tyLeads[i]||0)/totLead, ss=posSpend[i]/totSpend, d=ls-ss;
    return{s:d>=0.04?'under':d<=-0.04?'over':'ok',delta:d,ls,ss};
  });
  const misCount=status.filter(o=>o.s==='under'||o.s==='over').length;

  // ---- Best / worst months for lead volume ----
  const ranked=validM.map(i=>({i,avg:leadAvg[i],yrs:lCnt[i]})).sort((a,b)=>b.avg-a.avg);
  const top3=ranked.slice(0,3), bot3=ranked.slice(-3).reverse();

  // ---- Seasonal recommendations (drawn from demand-vs-spend gaps in the target year) ----
  const ups=status.map((o,i)=>({i,...o})).filter(o=>o.s==='under'&&leadAvg[o.i]>=meanLead).sort((a,b)=>b.delta-a.delta).slice(0,3);

  const recoHTML=(upCards+downCards)||`<div class="r hold"><div class="rt"><span class="tag">Hold</span>Spend tracks demand</div><p>No month is materially over- or under-funded relative to its share of ${TY} lead volume.</p></div>`;

  const peakVsTrough=leadAvg[slowLeadI]>0?leadAvg[peakLeadI]/leadAvg[slowLeadI]:0;

  p.innerHTML=`

   <div class="kpis">

     <div class="kpi bad"><div class="label">Slowest Lead Month</div><div class="val r">${MONTH_NAMES[slowLeadI]}</div><div class="sub">avg ${Math.round(leadAvg[slowLeadI])} leads · ${peakVsTrough?peakVsTrough.toFixed(1)+'× below peak':''}</div></div>
     <div class="kpi alt"><div class="label">Peak Spend Month (${TY})</div><div class="val">${peakSpendI!=null?MONTH_NAMES[peakSpendI]:'—'}</div><div class="sub">${peakSpendI!=null?fmtUSDfull(tySpend[peakSpendI])+' booked':'no spend data'}</div></div>
     <div class="kpi ${aligned?'':'warn'}"><div class="label">Peak Spend Aligned?</div><div class="val ${aligned?'g':'r'}">${aligned?'Aligned':'Misaligned'}</div><div class="sub">${peakSpendI!=null?`spend peaks in ${MONTH_NAMES[peakSpendI]}, leads in ${MONTH_NAMES[peakLeadI]}`:'—'}</div></div>
   </div>

   <div class="card">
     <h3>Monthly Lead Volume by Month of Year</h3><p class="csub">Average leads per calendar month across ${leadYears[0]}–${leadYears[leadYears.length-1]} — the underlying seasonal demand curve</p>
     <div id="soYear"></div>
     <div class="legend">
       <div class="item"><span class="swatch" style="background:#00e676"></span>In-season (≥ average of ${Math.round(meanLead)})</div>
       <div class="item"><span class="swatch" style="background:#3ba7ff"></span>Off-season (below average)</div>
     </div>
     <div class="note"><b>Read:</b> Demand is front-loaded — <b>${MONTH_NAMES[peakLeadI]}</b> (avg ${Math.round(leadAvg[peakLeadI])}) runs ${peakVsTrough?`<b>${peakVsTrough.toFixed(1)}×</b> the`:'well above the'} slowest month, <b>${MONTH_NAMES[slowLeadI]}</b> (avg ${Math.round(leadAvg[slowLeadI])}). The first quarter and year-end carry the year; mid-summer is the trough. Months are averaged over the years each appears in the data (${leadYears.length} year${leadYears.length===1?'':'s'} total), so partial recent months are included exactly as recorded.</div>
   </div>

   <div class="card">
     <h3>Spend vs Lead Volume Alignment · ${TY}</h3><p class="csub">Monthly marketing spend over the same months' lead volume — shaded bands mark months where spend and demand pull apart</p>
     <div id="soAlign"></div>

     </div>
     <div class="note"><b>Read:</b> ${misCount} of ${spendValid.length} funded months are misaligned. ${peakSpendI!=null&&!aligned?`The heaviest spend lands in <b>${MONTH_NAMES[peakSpendI]}</b> (${fmtUSDfull(tySpend[peakSpendI])}), well after the <b>${MONTH_NAMES[peakLeadI]}</b> demand peak.`:''} Several negative bars are accrual reversals booked into single months, not genuine budget cuts — the ${TY} P&amp;L records them as net figures.</div>
   </div>

   <div class="grid2">
     <div class="card"><h3>Best Months for Lead Volume</h3><p class="csub">Top 3 calendar months by average lead count</p><div id="soTop"></div></div>
     <div class="card"><h3>Worst Months for Lead Volume</h3><p class="csub">Bottom 3 calendar months by average lead count</p><div id="soBot"></div></div>
   </div>

   <div class="card">
     <h3>Seasonal Recommendations</h3><p class="csub">Where ${TY} spend is out of step with historical demand — generated from the gap between each month's share of leads and share of spend</p>
     <div class="reco" style="margin-top:6px">${recoHTML}</div>
   </div>

   <div class="card">
     <h3>Monthly Detail</h3><p class="csub">Every calendar month: average demand, and ${TY} leads vs spend with alignment flag</p>
     <div class="tbl-scroll"><table class="tbl">
       <thead><tr><th>Month</th><th>Avg Leads</th><th>Years</th><th>${TY} Leads</th><th>${TY} Spend</th><th>Demand Share</th><th>Spend Share</th><th>Alignment</th></tr></thead>
       <tbody>${MONTH_NAMES.map((mn,i)=>{const st=status[i];
         const pill=st.s==='over'?'<span class="pill bad">Overspent</span>':st.s==='under'?'<span class="pill good">Underspent</span>':st.s==='ok'?'<span class="pill mid">Aligned</span>':'—';
         return `<tr>
           <td>${mn}</td>
           <td class="${leadAvg[i]>=meanLead?'pos':''}">${lCnt[i]?fmtNum(Math.round(leadAvg[i])):'—'}</td>
           <td>${lCnt[i]||'—'}</td>
           <td>${tyLeads[i]==null?'—':fmtNum(tyLeads[i])}</td>
           <td class="${tySpend[i]<0?'neg':''}">${tySpend[i]==null?'—':fmtUSDfull(tySpend[i])}</td>
           <td>${tyLeads[i]==null?'—':pc(st.ls)}</td>
           <td>${tySpend[i]==null?'—':pc(st.ss)}</td>
           <td>${pill}</td></tr>`;}).join("")}
       </tbody>
     </table></div>
   </div>`;

  // Month-of-year average lead volume
  catBarChart(document.getElementById("soYear"),{
    cats:MONTH_NAMES.map((mn,i)=>({label:mn,full:mn+" · avg of "+lCnt[i]+" year"+(lCnt[i]===1?'':'s'),
      value:leadAvg[i], color:lCnt[i]===0?'#3a3a3a':leadAvg[i]>=meanLead?'#00e676':'#3ba7ff', _yrs:lCnt[i]})),
    yFmt:fmtNum, valLabel:c=>c._yrs?fmtNum(Math.round(c.value)):'—',
    tipRows:c=>`<div class="tt-row"><span class="k">Avg leads</span><span class="v">${c._yrs?fmtNum(Math.round(c.value)):'—'}</span></div><div class="tt-row"><span class="k">Years averaged</span><span class="v">${c._yrs||'—'}</span></div>`,
    height:300});

  // Spend-vs-lead alignment dual panel
  dualPanelChart(document.getElementById("soAlign"),{labels:MONTH_NAMES,spend:tySpend,leads:tyLeads,status,tyLabel:""+TY});

  hBarChart(document.getElementById("soBot"),{items:bot3.map(o=>({name:MONTH_NAMES[o.i],value:o.avg,color:'#ff6b8a',suffix:' leads'})),valFmt:v=>fmtNum(Math.round(v))});

// ---- CHART: conversion rate by state (converting states + high-volume zero-conversion "misses") ----
function convStateChart(el,{conv,missed}){
  const maxRate=Math.max(...conv.map(o=>o.rate),0.0001);
  const row=(o,type)=>{
    const pct=type==='conv'?Math.max(3,o.rate/maxRate*100):0;
    const col=type==='conv'?'#00e676':'#ff5252';
    const lab=type==='conv'?`${o.w}/${o.l} · ${o.rate.toFixed(2)}%`:`${fmtNum(o.l)} leads · 0`;
    return `<div style="display:flex;align-items:center;gap:12px">
      <div style="width:118px;flex:none;font-size:12.5px;color:var(--muted);text-align:right" title="${o.s}">${o.s}</div>
      <div style="flex:1;background:var(--surface3);border-radius:6px;height:20px;position:relative;overflow:hidden">
        <div style="width:${pct}%;height:100%;background:${col};border-radius:6px;min-width:${type==='conv'?2:0}px;opacity:.92"></div>
        ${type==='miss'?`<div style="position:absolute;inset:0;display:flex;align-items:center;padding-left:9px;font-size:10.5px;letter-spacing:.3px;color:var(--loss)">missed opportunity</div>`:''}
      </div>
      <div style="width:112px;flex:none;font-size:12px;font-weight:700;font-variant-numeric:tabular-nums;color:${col}">${lab}</div>
    </div>`;
  };
  let g='<div style="display:flex;flex-direction:column;gap:9px">';
  g+=conv.map(o=>row(o,'conv')).join('');
  if(missed.length){
    g+=`<div style="margin:8px 0 1px;font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--dim)">Highest-volume states with zero conversions</div>`;
    g+=missed.map(o=>row(o,'miss')).join('');
  }
  g+='</div>';
  el.innerHTML=g;
}

// ---- Geographic choropleth (two views over one set of outlines) ----
// Colors are validated against the card surface (#141414) rather than picked by eye:
//  · MAP_RAMP is a single-hue sequential ramp anchored on the brand green, monotone in
//    OKLCH lightness (ΔL ≈ .08/step). It runs dark→bright as volume rises: on a dark
//    surface the sequential anchor flips, so "more" has to mean "brighter" — a dark-for-
//    more ramp would put the busiest states at the same value as the background.
//  · Its low step still clears 2:1 on the card, which is what keeps a 1-lead state
//    readable next to MAP_GRAY. Gray carries zero chroma, so "no leads" reads as absence
//    rather than as the bottom of the green ramp (they separate at ΔE 18.6 normal /
//    14.6 deuteranopia — the reason the ramp does not start any darker than #007237).
//  · The conversion view reuses the dashboard's status tokens. Green↔amber sit at ΔE 7.5
//    under deuteranopia, so that pair ships secondary encoding: every converting state is
//    direct-labeled with its rate, and the State Performance table below repeats the
//    numbers. (Amber was kept at --c3 rather than pushed toward orange, which would have
//    collapsed against --loss red instead — a worse trade.)
const MAP_RAMP=["#007237","#008e46","#00aa56","#00c866","#00e676"];
const MAP_GRAY="#3a3a3a";           // no leads
const MAP_CONV_ZERO="#ff5252";      // var(--loss) — has leads, never closed one
const MAP_CONV_BELOW="#ffb020";     // var(--c3)   — converts, but under the network average
const MAP_CONV_ABOVE="#00e676";     // var(--green)— at / above the network average
// Too small at this projection to carry a legible centroid label; they fall back to hover.
const MAP_TINY=new Set(["District of Columbia","Rhode Island","Delaware","Connecticut",
  "New Jersey","Massachusetts","New Hampshire","Vermont","Maryland","Hawaii"]);
const DC_CHIP={x:884,y:276,w:17}; // DC projects to <1px — see renderGeoMap()
let GEO_MAP_MODE="volume";

// Quantile class breaks. Lead volume is heavily skewed (Texas 270 → Vermont 1), so equal
// intervals would drop ~40 states into one class; quantiles keep the classes populated.
// Ties collapse the edges, so dedupe — a flat distribution just yields fewer classes.
function mapBreaks(vals){
  const v=[...vals].sort((a,b)=>a-b), mn=v[0], mx=v[v.length-1];
  const q=p=>{const i=(v.length-1)*p,lo=Math.floor(i),hi=Math.ceil(i);return v[lo]+(v[hi]-v[lo])*(i-lo);};
  return [...new Set([.2,.4,.6,.8].map(p=>Math.ceil(q(p))))].filter(b=>b>mn&&b<=mx);
}
const mapRampFor=n=> n<=1?[MAP_RAMP[MAP_RAMP.length-1]]
  : n>=MAP_RAMP.length?MAP_RAMP.slice(-n)
  : Array.from({length:n},(_,i)=>MAP_RAMP[Math.round(i*(MAP_RAMP.length-1)/(n-1))]);

function geoMapMode(m){
  if(GEO_MAP_MODE===m) return;
  GEO_MAP_MODE=m;
  document.querySelectorAll("#geoMapSeg button").forEach(b=>b.classList.toggle("active",b.dataset.m===m));
  renderGeoMap();
}

function renderGeoMap(){
  const host=document.getElementById("geoMap"); if(!host) return;
  const byState={}; STATES.forEach(o=>byState[o.s]=o);
  const usLeads=STATE_META.usLeads||1, avgRate=(STATE_META.usWon||0)/usLeads*100;
  const vol=GEO_MAP_MODE==="volume";
  const breaks=mapBreaks(STATES.map(o=>o.l)), cols=mapRampFor(breaks.length+1);
  const clsOf=v=>breaks.reduce((a,b)=>a+(v>=b?1:0),0);
  const rateOf=o=>o.l?o.w/o.l*100:0;
  const convFillOf=o=>o.w===0?MAP_CONV_ZERO:rateOf(o)>=avgRate?MAP_CONV_ABOVE:MAP_CONV_BELOW;
  const fillOf=o=>!o?MAP_GRAY : vol?cols[clsOf(o.l)] : convFillOf(o);

  const aria=vol?`Map of the United States, states shaded by lead volume`
                :`Map of the United States, states shaded by conversion rate against the ${fmtPct(avgRate,2)} network average`;
  let g=`<svg class="chart usmap" viewBox="0 0 ${US_MAP_W} ${US_MAP_H}" preserveAspectRatio="xMidYMid meet" role="img" aria-label="${aria}"><g id="usStates">`;
  for(const name in US_STATE_PATHS)
    g+=`<path class="st" data-s="${name}" d="${US_STATE_PATHS[name]}" fill="${fillOf(byState[name])}"></path>`;
  g+=`</g><g id="usOverlay">`;
  // D.C. is ~0px² at this projection: invisible, and impossible to hover. Give it a chip
  // out in the Atlantic, tied back to its real position, carrying the same fill + tooltip.
  const dc=US_STATE_CENTROIDS["District of Columbia"];
  if(dc){
    g+=`<path class="dc-lead" d="M${dc[0]} ${dc[1]}L${DC_CHIP.x+DC_CHIP.w/2} ${DC_CHIP.y+DC_CHIP.w/2}"></path>`;
    g+=`<rect class="st" data-s="District of Columbia" data-chip="1" x="${DC_CHIP.x}" y="${DC_CHIP.y}" width="${DC_CHIP.w}" height="${DC_CHIP.w}" rx="2" fill="${fillOf(byState["District of Columbia"])}"></rect>`;
    g+=`<text class="mlbl" x="${DC_CHIP.x+DC_CHIP.w/2}" y="${DC_CHIP.y+DC_CHIP.w+11}" style="font-size:9.5px">DC</text>`;
  }
  // Hover outline. SVG has no z-index, so a stroke drawn on the state itself gets overdrawn
  // by whichever neighbors follow it in document order. Re-appending the hovered state to
  // lift it would mutate the DOM from inside mouseenter — which detaches the node mid-dispatch
  // and retargets that same mousemove to the parent <g>, so the tooltip never fires. Instead
  // this one spare path sits above every state and borrows the hovered state's own outline.
  g+=`<path id="stHi" fill="none" pointer-events="none" opacity="0"></path>`;
  // Secondary encoding for the conversion view (see MAP_CONV_* above): label every state
  // that has actually closed a deal, so above/below average never rests on hue alone.
  if(!vol) STATES.filter(o=>o.w>0&&!MAP_TINY.has(o.s)&&US_STATE_CENTROIDS[o.s]).forEach(o=>{
    const [x,y]=US_STATE_CENTROIDS[o.s];
    g+=`<text class="mlbl" x="${x}" y="${y+3.5}">${rateOf(o).toFixed(1)}%</text>`;
  });
  g+=`</g></svg>`;
  host.innerHTML=g; host.classList.add("chart-wrap");

  const svg=host.querySelector("svg"), tip=attachTip(host), hi=svg.querySelector("#stHi");
  const chipD=`M${DC_CHIP.x} ${DC_CHIP.y}h${DC_CHIP.w}v${DC_CHIP.w}h-${DC_CHIP.w}Z`;
  svg.querySelectorAll(".st").forEach(el=>{
    const o=byState[el.dataset.s];
    el.addEventListener("mouseenter",()=>{
      hi.setAttribute("d", el.dataset.chip?chipD:US_STATE_PATHS[el.dataset.s]||"");
      hi.setAttribute("opacity","1");
    });
    el.addEventListener("mousemove",e=>{
      const rows=o?`<div class="tt-row"><span class="k">Total Leads</span><span class="v">${fmtNum(o.l)}</span></div>
         <div class="tt-row"><span class="k">Conversions</span><span class="v">${o.w}</span></div>
         <div class="tt-row"><span class="k">Conversion Rate</span><span class="v" style="color:${convFillOf(o)}">${o.w?fmtPct(rateOf(o),2):"0.00%"}</span></div>`
        :`<div class="tt-row"><span class="k">No leads recorded</span><span class="v">—</span></div>`;
      tip.innerHTML=`<div class="tt-title">${el.dataset.s}</div>${rows}`;
      tip.style.opacity=1;
      // Position against the host box, not the <svg>: the map is a centered max-width child,
      // and SVGElement has no offsetLeft/offsetTop to correct for that gap with.
      const hr=host.getBoundingClientRect();
      moveTip(tip,host,e.clientX-hr.left,e.clientY-hr.top);
    });
    el.addEventListener("mouseleave",()=>{tip.style.opacity=0;hi.setAttribute("opacity","0");});
  });

  const lg=document.getElementById("geoMapLegend");
  const grayItem=`<div class="item"><span class="swatch" style="background:${MAP_GRAY}"></span>No leads</div>`;
  if(vol){
    const mn=Math.min(...STATES.map(o=>o.l)), mx=Math.max(...STATES.map(o=>o.l));
    // Label each class with the range it actually covers — the breaks are quantiles of this
    // dataset, so they are not round numbers and have to be shown rather than inferred.
    const clsLo=i=>i===0?mn:breaks[i-1], clsHi=i=>i===cols.length-1?mx:breaks[i]-1;
    lg.innerHTML=`<span class="lgd">Leads per state</span>
      ${cols.map((c,i)=>`<div class="item"><span class="swatch" style="background:${c}"></span>${
        clsLo(i)===clsHi(i)?fmtNum(clsLo(i)):`${fmtNum(clsLo(i))}–${fmtNum(clsHi(i))}`}</div>`).join("")}
      ${grayItem}`;
  } else {
    lg.innerHTML=`<span class="lgd">vs ${fmtPct(avgRate,2)} network avg</span>
      <div class="item"><span class="swatch" style="background:${MAP_CONV_ABOVE}"></span>At / above average</div>
      <div class="item"><span class="swatch" style="background:${MAP_CONV_BELOW}"></span>Below average</div>
      <div class="item"><span class="swatch" style="background:${MAP_CONV_ZERO}"></span>No conversions</div>
      ${grayItem}`;
  }
}

// ---- Sortable State Performance table (state re-renders in place, preserves scroll) ----
let GEO_SORT={key:'l',dir:-1};
function geoSortBy(k){ if(GEO_SORT.key===k) GEO_SORT.dir*=-1; else GEO_SORT={key:k,dir:k==='s'?1:-1}; renderGeoTable(); }
function renderGeoTable(){
  const tb=document.getElementById('geoTbody'); if(!tb) return;
  const usLeads=STATE_META.usLeads||1, n=STATES.length||1, avg=usLeads/n;
  const val={s:o=>o.s, l:o=>o.l, w:o=>o.w, rate:o=>o.l?o.w/o.l:0, pct:o=>o.l/usLeads, eff:o=>o.l};
  const f=val[GEO_SORT.key]||val.l;
  const rows=[...STATES].sort((a,b)=>{const av=f(a),bv=f(b);
    if(typeof av==='string') return GEO_SORT.dir*av.localeCompare(bv);
    return GEO_SORT.dir*(av-bv)||(b.l-a.l); });
  const effL=l=> l>=avg?['High','good']:l>=avg/2?['Medium','mid']:['Low','bad'];
  tb.innerHTML=rows.map(o=>{ const [el,ec]=effL(o.l); const rate=o.l?o.w/o.l*100:0;
    return `<tr><td>${o.s}</td><td>${fmtNum(o.l)}</td><td>${o.w}</td><td>${rate>0?fmtPct(rate,2):'—'}</td><td>${fmtPct(o.l/usLeads*100,1)}</td><td><span class="pill ${ec}">${el}</span></td></tr>`; }).join('');
  document.querySelectorAll('#geoTable th[data-k]').forEach(th=>{
    const c=th.querySelector('.cS'); if(c) c.textContent = GEO_SORT.key===th.dataset.k ? (GEO_SORT.dir<0?' ▾':' ▴') : '';
  });
}

// ---- TAB: GEOGRAPHIC (leads by state relative to marketing reach) ----
function buildGeographic(){
  const p=document.getElementById("tab7");
  const S=STATES, M=STATE_META;
  if(!S.length){ p.innerHTML=`<div class="tab-head"><h2>Geographic Performance</h2><p>No state-level lead data available.</p></div>`; return; }
  const usLeads=M.usLeads, n=S.length, avg=usLeads/n;
  const conv=o=>o.l?o.w/o.l*100:0;
  const topVol=S[0];
  const topConv=S.reduce((a,b)=>{ const ca=conv(a),cb=conv(b); return (cb>ca||(cb===ca&&b.l>a.l))?b:a; });
  const eff=(topVol.l/avg);
  const top10=S.slice(0,10);
  const converting=S.filter(o=>o.w>0).map(o=>({...o,rate:conv(o)})).sort((a,b)=>b.rate-a.rate||b.l-a.l);
  const missed=S.filter(o=>o.w===0&&o.l>=avg).sort((a,b)=>b.l-a.l).slice(0,8);

// ---- TAB: BUDGET RECOMMENDATIONS (data-driven allocation from channel conversion) ----
// Recommended split: performing channels (won>0) tilt their current lead-volume share toward
// efficiency vs the 2.5% benchmark; zero-conversion channels are floored to 10% of current share
// (minimal presence). Projected impact is deliberately conservative — it credits channel growth
// only up to 3× each channel's *proven* volume (overflow returns to the highest-volume channel)
// so small-sample conversion rates are never over-extrapolated.
function brStats(){
  const bench=INDUSTRY_BENCHMARK/100; // 0.025
  const ch=CHANNELS.map((c,i)=>({name:c.name,color:CHANNEL_COLORS[i%CHANNEL_COLORS.length],leads:c.leads,won:c.won}));
  const totLeads=sum(ch.map(c=>c.leads))||1, totWon=sum(ch.map(c=>c.won));
  ch.forEach(c=>{c.conv=c.leads?c.won/c.leads:0; c.curShare=c.leads/totLeads;});
  ch.forEach(c=>{ c.w = c.won>0 ? c.curShare*(c.conv/bench) : c.curShare*0.10; });
  const totW=sum(ch.map(c=>c.w))||1;
  ch.forEach(c=>c.recShare=c.w/totW);
  // proven-scale cap (≤3× current share; overflow → highest-volume channel) for the conservative projection
  const hi=ch.reduce((a,b)=>b.leads>a.leads?b:a);
  let ov=0; ch.forEach(c=>{const cap=3*c.curShare; c.capShare=c.recShare; if(c!==hi&&c.recShare>cap){ov+=c.recShare-cap;c.capShare=cap;}}); hi.capShare+=ov;
  const curConv=totWon/totLeads, projConv=sum(ch.map(c=>c.capShare*c.conv));
  const ratio=curConv>0?projConv/curConv:1;
  // financials from Income Statement A&M spend (2023–2025) + CRM leads
  const yrs=[2023,2024,2025], fi=y=>FUND.years.indexOf(y);
  const spend2325=sum(yrs.map(y=>FUND.advertisingMarketing[fi(y)]||0));
  const leads2325=sum(yrs.map(y=>LEADS_BY_YEAR[y]||0))||1;
  const cpl=spend2325/leads2325, costPerDeal=CLOSED_DEALS?spend2325/CLOSED_DEALS:0;
  const noResp=sum(Object.values(DEAD_BY_CHANNEL).map(r=>r["No Response"]||0));
  const lastAM=FUND.advertisingMarketing[FUND.advertisingMarketing.length-1]||740000;
  const defQ=Math.round((lastAM/4)/5000)*5000;
  return {ch,totLeads,totWon,curConv,projConv,ratio,cpl,costPerDeal,noResp,spend2325,leads2325,defQ,bench};
}

function renderBudgetDynamic(){
  const host=document.getElementById("brDynamic"); if(!host) return;
  const st=brStats(), B=BUDGET_Q, bench=INDUSTRY_BENCHMARK;
  const rows=st.ch.map(c=>({...c,curB:c.curShare*B,recB:c.recShare*B,delta:(c.recShare-c.curShare)*B}))
                  .sort((a,b)=>b.leads-a.leads);
  const curSegs=rows.map(c=>({label:c.name,value:c.curB,color:c.color}));
  const recSegs=rows.map(c=>({label:c.name,value:c.recB,color:c.color}));
  const deltaCell=d=>{const s=Math.abs(d)<1?'<span style="color:var(--dim)">—</span>':`<span style="color:${d>0?'var(--green)':'var(--loss)'}">${d>0?'▲ +':'▼ −'}${fmtUSD(Math.abs(d))}</span>`;return s;};

  // ---- Auto-generated action cards from the same data ----
  const byLeads=[...rows];
  const hiConv=byLeads[0]?byLeads[0].conv:0; // highest-volume channel = the "site average" baseline
  const winners=rows.filter(c=>c.won>0 && c.conv*100>=bench).sort((a,b)=>b.conv-a.conv);
  const fixer=rows.filter(c=>c.won>0 && c.conv*100<bench).sort((a,b)=>b.leads-a.leads)[0];
  const deadHigh=rows.filter(c=>c.won===0 && c.leads>=50).sort((a,b)=>b.leads-a.leads);
  const deadLow=rows.filter(c=>c.won===0 && c.leads<50).sort((a,b)=>b.leads-a.leads);
  const cards=[];
  winners.forEach(c=>{
    const mult=hiConv>0?(c.conv/hiConv):0;
    cards.push({cls:"up",tag:"Grow",icon:"📈",title:`Scale ${c.name}`,
      body:`Converts at <b>${fmtPct(c.conv*100,2)}</b> (${c.won} of ${fmtNum(c.leads)} leads)${mult>=2?` — ${mult.toFixed(0)}× the site-wide average`:''}, ${c.conv*100>=bench?'above':'near'} the ${fmtPct(bench,1)} benchmark. Raise quarterly spend <b>${fmtUSD(c.curB)} → ${fmtUSD(c.recB)}</b>. Small sample — phase in and re-measure as volume grows.`});
  });
  if(fixer) cards.push({cls:"hold",tag:"Fix",icon:"🌐",title:`Trim — don't kill — ${fixer.name}`,
    body:`<b>${fmtPct(fixer.curShare*100,0)}</b> of all leads but only <b>${fmtPct(fixer.conv*100,2)}</b> convert, yet it still drives ${fixer.won} of ${st.totWon} total closes. Reduce <b>${fmtUSD(fixer.curB)} → ${fmtUSD(fixer.recB)}</b> and route the savings into follow-up rather than more top-of-funnel traffic — the bottleneck is conversion, not volume.`});
  deadHigh.forEach(c=>cards.push({cls:"down",tag:"Cut",icon:"✂️",title:`Cut ${c.name}`,
    body:`${fmtNum(c.leads)} leads, <b>0 closes</b> — the highest-volume dead channel. Reduce <b>${fmtUSD(c.curB)} → ${fmtUSD(c.recB)}</b> and hold at a maintenance level until lead quality and routing are fixed.`}));
  if(deadLow.length){
    const names=deadLow.map(c=>c.name).join(" &amp; "), dl=sum(deadLow.map(c=>c.leads)), dr=sum(deadLow.map(c=>c.recB));
    cards.push({cls:"down",tag:"Cut",icon:"🛑",title:`Minimize ${names}`,
      body:`${names} generated <b>${fmtNum(dl)} leads and 0 closes</b> (100% went dead, mostly on "No Response"). Hold at a minimal combined test budget of <b>${fmtUSD(dr)}</b> — reallocate the rest to channels that actually convert.`});
  }
  cards.push({cls:"up",tag:"Build",icon:"⚡",title:"Fix follow-up before buying more traffic",
    body:`<b>${fmtNum(st.noResp)} of ${fmtNum(st.totLeads)} leads (${fmtPct(st.noResp/st.totLeads*100,0)})</b> died on "No Response" — roughly <b>${fmtUSD(st.noResp*st.cpl)}</b> of lead-acquisition spend that returned nothing. Fund a dedicated CRM automation &amp; SDR speed-to-lead motion: the cheapest deal is the lead you already paid for.`});
  const actionHtml=cards.map(c=>`<div class="r ${c.cls}"><div class="rt"><span class="tag">${c.tag}</span>${c.icon} ${c.title}</div><p>${c.body}</p></div>`).join("");

  // ---- Projected impact (annualized: this quarterly budget × 4) ----
  const annualB=B*4;
  const leadsY=st.cpl?annualB/st.cpl:0;
  const curConvY=st.costPerDeal?annualB/st.costPerDeal:0;
  const projConvY=curConvY*st.ratio;

  const pill=(txt,good)=>`<span class="pill ${good?'good':'bad'}">${txt}</span>`;
  const impactHtml=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px">

    ${tile("Annual Conversions",curConvY.toFixed(1),projConvY.toFixed(1),pill(`▲ +${fmtPct((st.ratio-1)*100,0)}`,true),`Closed franchise deals per year, applying each channel's measured conversion to the recommended mix (capped at 3× proven volume).`)}
    ${tile("Cost / Conversion",fmtUSD(curCPC),fmtUSD(projCPC),pill(`▼ −${fmtPct((1-1/st.ratio)*100,0)}`,true),`Total spend ÷ closed deals. Reallocating toward channels that convert lowers cost per deal without adding budget.`)}
  </div>`;

  host.innerHTML=`
   <div class="card">
     <h3>Current vs Recommended Budget Split</h3>
     <p class="csub">Left of each row = current implied split (each channel's share of today's lead volume) · right = the data-driven recommended split for ${fmtUSDfull(B)}/quarter</p>
     <div style="display:flex;flex-direction:column;gap:14px;margin-top:4px">
       <div><div style="font-size:12px;color:var(--muted);font-weight:600;margin-bottom:6px">Current implied allocation</div><div id="brCurBar"></div></div>
       <div><div style="font-size:12px;color:var(--muted);font-weight:600;margin-bottom:6px">Recommended allocation</div><div id="brRecBar"></div></div>

       <thead><tr><th>Channel</th><th>Conversion</th><th>Current %</th><th>Current $/qtr</th><th>Recommended %</th><th>Recommended $/qtr</th><th>Change</th></tr></thead>
       <tbody>${rows.map(c=>`<tr>
         <td><span class="chip"><span class="sw" style="background:${c.color}"></span>${c.name}</span></td>
         <td class="${c.conv*100>=bench?'pos':'neg'}">${fmtPct(c.conv*100,2)}</td>
         <td>${fmtPct(c.curShare*100,1)}</td><td>${fmtUSDfull(c.curB)}</td>

   </div>

// ============================== XLSX READER (offline, no deps) ==============================
// Uses the ZIP central directory + native DecompressionStream('deflate-raw') to unpack
// .xlsx workbooks entirely in the browser, then a light regex parser for the sheet XML.
async function readXlsx(arrayBuffer){
  const dv=new DataView(arrayBuffer), u8=new Uint8Array(arrayBuffer), td=new TextDecoder();
  // locate End Of Central Directory
  let eocd=-1;
  for(let i=arrayBuffer.byteLength-22;i>=0;i--){ if(dv.getUint32(i,true)===0x06054b50){eocd=i;break;} }
  if(eocd<0) throw new Error("Not a valid .xlsx file (missing ZIP directory).");
  const cdOffset=dv.getUint32(eocd+16,true), cdCount=dv.getUint16(eocd+10,true);
  const entries={}; let p=cdOffset;
  for(let i=0;i<cdCount;i++){
    if(dv.getUint32(p,true)!==0x02014b50) break;
    const method=dv.getUint16(p+10,true), compSize=dv.getUint32(p+20,true);
    const fnLen=dv.getUint16(p+28,true), extraLen=dv.getUint16(p+30,true), commentLen=dv.getUint16(p+32,true);
    const localOff=dv.getUint32(p+42,true);
    const name=td.decode(u8.subarray(p+46,p+46+fnLen));
    entries[name]={method,compSize,localOff};
    p+=46+fnLen+extraLen+commentLen;
  }
  async function extract(name){
    const e=entries[name]; if(!e) return null;
    const lh=e.localOff;
    const lfn=dv.getUint16(lh+26,true), lex=dv.getUint16(lh+28,true);
    const start=lh+30+lfn+lex;
    const comp=u8.subarray(start,start+e.compSize);
    let bytes;
    if(e.method===0){ bytes=comp; }
    else if(e.method===8){
      if(typeof DecompressionStream==="undefined") throw new Error("This browser can't decompress .xlsx (no DecompressionStream). Use a recent Chrome/Edge/Safari/Firefox.");
      const ds=new DecompressionStream("deflate-raw");
      const stream=new Blob([comp]).stream().pipeThrough(ds);
      bytes=new Uint8Array(await new Response(stream).arrayBuffer());
    } else throw new Error("Unsupported compression in .xlsx (method "+e.method+").");
    return td.decode(bytes);
  }
  // shared strings
  const sst=[];
  const sstXml=await extract("xl/sharedStrings.xml");
  if(sstXml){ const re=/<si>([\s\S]*?)<\/si>/g; let m; while((m=re.exec(sstXml))){ let s=""; const tre=/<t[^>]*>([\s\S]*?)<\/t>/g; let tm; while((tm=tre.exec(m[1]))) s+=tm[1]; sst.push(decodeXml(s)); } }
  // pick first worksheet
  const wbXml=await extract("xl/workbook.xml");
  const relsXml=await extract("xl/_rels/workbook.xml.rels");
  let target="xl/worksheets/sheet1.xml";
  if(wbXml){ const rid=(wbXml.match(/<sheet[^>]*r:id="([^"]+)"/)||[])[1];
    if(rid&&relsXml){ const rm=relsXml.match(new RegExp('Id="'+rid+'"[^>]*Target="([^"]+)"')); if(rm) target="xl/"+rm[1].replace(/^\/?xl\//,"").replace(/^\/?/,""); } }
  if(!entries[target]){ target=Object.keys(entries).find(n=>/^xl\/worksheets\/sheet.*\.xml$/.test(n))||target; }
  const sheetXml=await extract(target);
  if(sheetXml==null) throw new Error("Worksheet not found inside .xlsx.");
  return {sst, sheetXml};
}
function decodeXml(s){ return (s||"").replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/&quot;/g,'"').replace(/&apos;/g,"'").replace(/&#(\d+);/g,(_,n)=>String.fromCharCode(+n)).replace(/&#x([0-9a-fA-F]+);/g,(_,n)=>String.fromCharCode(parseInt(n,16))).replace(/&amp;/g,"&"); }
function colToIdx(letters){ let n=0; for(let i=0;i<letters.length;i++) n=n*26+(letters.charCodeAt(i)-64); return n-1; }
// Iterate worksheet rows -> callback(rowNum, cellsArray). cellsArray indexed by 0-based column.
function eachRow(sheetXml, sst, cb){
  const rowRe=/<row[^>]*\br="(\d+)"[^>]*>([\s\S]*?)<\/row>/g; let rm;
  const cellRe=/<c\s+r="([A-Z]+)\d+"([^>]*?)(?:\/>|>([\s\S]*?)<\/c>)/g;
  while((rm=rowRe.exec(sheetXml))){
    const cells=[]; const body=rm[2]; let cm; cellRe.lastIndex=0;
    while((cm=cellRe.exec(body))){
      const col=colToIdx(cm[1]), attrs=cm[2]||"", inner=cm[3]||"";
      const t=(attrs.match(/\bt="([^"]+)"/)||[])[1]; let val=null;
      if(t==="s"){ const vi=(inner.match(/<v>(\d+)<\/v>/)||[])[1]; if(vi!=null) val=sst[+vi]; }
      else if(t==="inlineStr"){ let s=""; const tre=/<t[^>]*>([\s\S]*?)<\/t>/g,mm=[]; let tm; while((tm=tre.exec(inner))) s+=tm[1]; val=decodeXml(s); }
      else if(t==="str"){ val=decodeXml((inner.match(/<v>([\s\S]*?)<\/v>/)||[])[1]||""); }
      else { const vm=inner.match(/<v>([\s\S]*?)<\/v>/); if(vm) val=parseFloat(vm[1]); }
      cells[col]=val;
    }
    cb(+rm[1], cells);
  }
}

// ============================== P&L PARSING ==============================
function entityFromLocation(loc){
  loc=(loc||"").trim();
  for(const k of Object.keys(BASE_ENTITY_COLORS)){ if(loc.toLowerCase().includes(k.toLowerCase())) return k; }
  let s=loc.replace(/x\s*golf/ig,"").replace(/\b(inc|llc|ltd|corporation|corp|franchising|company|co|valley)\b\.?/ig,"").replace(/[,\.]/g,"").replace(/\s+/g," ").trim();
  return s||loc;
}
function parseDateCell(v){
  if(v==null) return null;
  if(typeof v==="number"&&isFinite(v)){ // Excel serial date
    const ms=Math.round((v-25569)*86400000); const d=new Date(ms);
    return {year:d.getUTCFullYear(), month:d.getUTCMonth()+1};
  }
  const m=String(v).match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/); // MM/DD/YYYY
  if(m) return {year:+m[3], month:+m[1]};
  const iso=String(v).match(/(\d{4})-(\d{2})-(\d{2})/);
  if(iso) return {year:+iso[1], month:+iso[2]};
  return null;
}
// Whole-day number (days since 1970-01-01 UTC) for date diffing, or null. Time-of-day ignored.
function dateToDayNum(v){
  if(v==null||v==="") return null;
  if(typeof v==="number"&&isFinite(v)) return Math.floor(v-25569); // Excel serial → day index
  const m=String(v).match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/); // MM/DD/YYYY
  if(m) return Math.round(Date.UTC(+m[3],+m[1]-1,+m[2])/86400000);
  const iso=String(v).match(/(\d{4})-(\d{2})-(\d{2})/);
  if(iso) return Math.round(Date.UTC(+iso[1],+iso[2]-1,+iso[3])/86400000);
  return null;
}
// Returns {entity, months:[{year,month,value}]} or null if file has no A&M line.
function parsePL(sst, sheetXml){
  const rows=[]; eachRow(sheetXml,sst,(n,cells)=>{rows[n]=cells;});
  // location
  let entity=null;
  for(let r=1;r<Math.min(rows.length,20);r++){
    const a=rows[r]&&rows[r][0];
    if(a&&/location/i.test(String(a))){ entity=entityFromLocation(rows[r][1]); break; }
  }
  if(!entity){ // fallback: any cell that looks like "X Golf ..."
    for(let r=1;r<Math.min(rows.length,20);r++){ const c=rows[r]||[]; for(const v of c){ if(v&&/x\s*golf/i.test(String(v))){ entity=entityFromLocation(v); break; } } if(entity) break; }
  }
  // date header row: the row (in the first ~15) with the most parseable dates
  let dateRow=-1, best=0, dateCols=null;
  for(let r=1;r<Math.min(rows.length,16);r++){
    const c=rows[r]||[]; const cols={}; let cnt=0;
    for(let x=1;x<c.length;x++){ const d=parseDateCell(c[x]); if(d&&d.year>=2015&&d.year<=2100){cols[x]=d;cnt++;} }
    if(cnt>best){ best=cnt; dateRow=r; dateCols=cols; }
  }
  if(dateRow<0||best===0) throw new Error("Could not find month columns in P&L.");
  // advertising & marketing row
  let advRow=-1;
  for(let r=1;r<rows.length;r++){ const a=rows[r]&&rows[r][0]; if(a&&/advertis/i.test(String(a))){ advRow=r; break; } }
  const months=[];
  if(advRow>=0){
    const ac=rows[advRow]||[];
    Object.keys(dateCols).forEach(x=>{ const v=ac[x]; if(typeof v==="number"&&isFinite(v)){ months.push({year:dateCols[x].year,month:dateCols[x].month,value:v}); } });
  }
  return {entity, months, hasAdv:advRow>=0};
}

// ============================== CRM PARSING ==============================
function classifyChannel(cat,det,oth){
  cat=(cat||"").trim(); det=(det||"").trim(); oth=(oth||"").trim();
  if(cat==="Import") return "List Import";
  if(cat==="Advertisement") return "LinkedIn / Paid Ads";
  const dl=det.toLowerCase(), ol=oth.toLowerCase();
  if(dl.startsWith("xgolf")) return "Store Referral";
  if(det==="Website") return "Website (Direct)";
  if(ol.includes("ninja")) return "Web Form (Ninja)";
  return "Web Form (Other)";
}
const REASON_NAMED={"No Response":"No Response","Market Unavailable":"Market Unavailable","Financing Not Available":"Financing Not Available","Not Interested":"Not Interested","Outside our sales region":"Outside Region"};
function groupReason(r){ r=(r||"").trim(); return REASON_NAMED[r]||"Other"; }
function statusBucket(s){ s=(s||"").trim();
  if(s==="Dead Lead") return "Dead Lead";
  if(s==="Contacted") return "Contacted";
  if(s==="Nurture") return "Nurture";
  if(s==="Intro Call") return "Intro Call";
  if(s==="Closed Lead- Sold") return "Closed — Sold";
  return "Other (pipeline)";
}
// Parse Export.xlsx into deduped records, adding into crmRecords. Returns {added, duplicate, total}.
function parseCRM(sst, sheetXml){
  let header=null, col={}, added=0, dup=0, seen=0;
  const want=["Inquiry Date","Email","Lead Status","Lead Reason","Lead Source Category","Lead Source Details","Other Lead Sources","Franchise Awarded Date","First Contacted","State / Province","First Name","Last Name","City","Lead Rating"];
  eachRow(sheetXml,sst,(n,cells)=>{
    if(!header){ header=cells;
      want.forEach(w=>{ for(let i=0;i<header.length;i++){ if(String(header[i]||"").trim()===w){ col[w]=i; break; } } });
      return;
    }
    const inqRaw=cells[col["Inquiry Date"]];
    const email=String(cells[col["Email"]]||"").trim().toLowerCase();
    if(inqRaw==null&&!email) return; // skip fully blank rows
    seen++;
    const key=String(inqRaw||"").trim()+"|"+email;
    const d=parseDateCell(inqRaw);
    const status=cells[col["Lead Status"]];
    // response time: whole days from Inquiry Date to First Contacted (blank First Contacted = never contacted)
    const inqDay=dateToDayNum(inqRaw), fcDay=dateToDayNum(cells[col["First Contacted"]]);
    const respDays=(fcDay!=null&&inqDay!=null)?Math.max(0,fcDay-inqDay):null;
    const contacted=(respDays!=null); // has a measurable inquiry→first-contact gap
    const rec={
      inqYear:d?d.year:null, inqMonth:d?d.month:null,
      contacted, respDays, inqDay,
      // raw Lead Status (statusBucket collapses Discovery/FDD Review/Approved into "Other (pipeline)",
      // but the Follow-Up Queue needs each stage by name)
      status:String(status||"").trim(),
      name:[String(cells[col["First Name"]]||"").trim(),String(cells[col["Last Name"]]||"").trim()].filter(Boolean).join(" "),
      city:String(cells[col["City"]]||"").trim(),
      rating:String(cells[col["Lead Rating"]]||"").trim(),
      statusBucket:statusBucket(status),
      sold:String(status||"").trim()==="Closed Lead- Sold",
      reasonGroup:groupReason(cells[col["Lead Reason"]]),
      channel:classifyChannel(cells[col["Lead Source Category"]],cells[col["Lead Source Details"]],cells[col["Other Lead Sources"]]),
      awardYear:(parseDateCell(cells[col["Franchise Awarded Date"]])||{}).year||null,
      awardMonth:(parseDateCell(cells[col["Franchise Awarded Date"]])||{}).month||null,
      awardDay:dateToDayNum(cells[col["Franchise Awarded Date"]]),
      state:String(cells[col["State / Province"]]||"").trim()
    };
    if(crmRecords.has(key)) dup++; else added++;
    crmRecords.set(key,rec);
  });
  return {added, dup, seen, total:crmRecords.size};
}

// ============================== UPLOAD WIRING ==============================
async function handlePLFiles(files){
  files=[...files]; if(!files.length) return;
  let okFiles=0, monthSet=new Set(), errs=[], skipped=[];
  for(const f of files){
    try{
      const buf=await f.arrayBuffer();
      const {sst,sheetXml}=await readXlsx(buf);
      const {entity,months,hasAdv}=parsePL(sst,sheetXml);
      if(!hasAdv||!months.length){ skipped.push((entity||f.name)+" (no Advertising & Marketing line)"); continue; }
      months.forEach(mm=>{ const k=mkKey(mm.year,mm.month); (spendStore[k]=spendStore[k]||{})[entity]=mm.value; monthSet.add(k); });
      okFiles++;
    }catch(err){ errs.push(f.name+": "+err.message); }
  }
  if(okFiles){ plUploaded=true; rebuildAll();
    const keys=[...monthSet].sort(); const first=keys[0], last=keys[keys.length-1];
    const fmtK=k=>{const[y,m]=k.split("-");return MONTH_NAMES[+m-1]+" "+y;};
    toast("ok","P&L merged — "+okFiles+" file"+(okFiles>1?"s":""),
      monthSet.size+" month"+(monthSet.size>1?"s":"")+" updated ("+fmtK(first)+(first!==last?" – "+fmtK(last):"")+"). Data now through "+document.getElementById("metaSpend").textContent+".");
  }
  if(skipped.length) toast("info","Skipped "+skipped.length+" file"+(skipped.length>1?"s":""), skipped.join("<br>"));
  if(errs.length) toast("err","Couldn't read "+errs.length+" file"+(errs.length>1?"s":""), errs.join("<br>"));
}
async function handleCRMFile(file){
  if(!file) return;
  try{
    const buf=await file.arrayBuffer();
    const {sst,sheetXml}=await readXlsx(buf);
    const before=crmRecords.size;
    const wasUploaded=crmUploaded;
    if(!wasUploaded) crmRecords=new Map(); // first upload starts fresh (embedded aggregates can't be decomposed to records)
    const {added,dup,seen}=parseCRM(sst,sheetXml);
    if(seen===0){ toast("err","No lead rows found","That file doesn't look like a CRM Export (no Inquiry Date / Email columns)."); if(!wasUploaded&&before===0) crmUploaded=false; return; }
    crmUploaded=true; rebuildAll();
    toast("ok","CRM updated — "+TOTAL_LEADS.toLocaleString()+" unique leads",
      added+" new record"+(added===1?"":"s")+" added"+(dup?", "+dup+" duplicate"+(dup===1?"":"s")+" skipped (Inquiry Date + email)":"")+". Closed deals: "+CLOSED_DEALS+".");
  }catch(err){ toast("err","Couldn't read CRM file", err.message); }
}
function clearUploads(){
  seedBaseSpend(); crmRecords=new Map(); crmUploaded=false; plUploaded=false;
  rebuildAll();
  toast("info","Reverted to embedded data","All uploaded P&L and CRM data cleared.");
}
