<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Marketing Performance Dashboard — X Golf America</title>
<style>
  :root{
    --bg:#0a0a0a; --surface:#141414; --surface2:#1b1b1b; --surface3:#232323;
    --border:#2a2a2a; --border2:#383838;
    --green:#00e676; --green-dim:#00b25c;
    --text:#ffffff; --muted:#9a9a9a; --dim:#6a6a6a;
    --loss:#ff5252; --loss-dim:#c53b3b;
    --c1:#00e676; --c2:#3ba7ff; --c3:#ffb020; --c4:#b37feb;
    --c5:#ff6b8a; --c6:#2dd4bf; --c7:#ff8c42;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.5;
  }
  a{color:var(--green)}
  .wrap{max-width:1280px;margin:0 auto;padding:0 24px}

  header.top{
    border-bottom:1px solid var(--border);
    background:linear-gradient(180deg,#0f0f0f,#0a0a0a);
    position:sticky;top:0;z-index:50;
  }
  .head-inner{display:flex;align-items:center;gap:18px;padding:16px 24px;max-width:1280px;margin:0 auto}
  .head-inner img{height:44px;width:auto;display:block}
  .head-titles h1{font-size:19px;margin:0;font-weight:700;letter-spacing:.2px}
  .head-titles p{margin:2px 0 0;font-size:12.5px;color:var(--muted);letter-spacing:.4px;text-transform:uppercase}
  .head-spacer{flex:1}
  .head-meta{text-align:right;font-size:11px;color:var(--dim);line-height:1.5}
  .head-meta b{color:var(--green);font-weight:600}

  nav.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);background:var(--bg);
    position:sticky;top:77px;z-index:40;overflow-x:scroll;padding:0 24px;max-width:1280px;margin:0 auto;
    scrollbar-width:thin;scrollbar-color:#00e676 #1a1a1a}
  nav.tabs::-webkit-scrollbar{height:8px}
  nav.tabs::-webkit-scrollbar-track{background:#1a1a1a}
  nav.tabs::-webkit-scrollbar-thumb{background:#00e676;border-radius:4px}
  nav.tabs::-webkit-scrollbar-thumb:hover{background:#00e676}
  nav.tabs button{
    background:none;border:none;color:var(--muted);font-size:13.5px;font-weight:600;
    padding:14px 16px;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;
    font-family:inherit;transition:color .15s;
  }
  nav.tabs button .num{color:var(--dim);font-weight:700;margin-right:7px;font-variant-numeric:tabular-nums}
  nav.tabs button:hover{color:#ddd}
  nav.tabs button.active{color:var(--green);border-bottom-color:var(--green)}
  nav.tabs button.active .num{color:var(--green)}

  .tab-panel{display:none;padding:28px 0 80px}
  .tab-panel.active{display:block}
  .tab-head{margin-bottom:20px}
  .tab-head h2{font-size:22px;margin:0 0 4px;font-weight:700}
  .tab-head p{margin:0;color:var(--muted);font-size:13.5px;max-width:820px}

  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:22px}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;position:relative;overflow:hidden}
  .kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--green);opacity:.85}
  .kpi.alt::before{background:var(--c2)} .kpi.warn::before{background:var(--c3)}
  .kpi.bad::before{background:var(--loss)} .kpi.pur::before{background:var(--c4)}
  .kpi .label{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:600}
  .kpi .val{font-size:26px;font-weight:700;margin-top:6px;font-variant-numeric:tabular-nums;letter-spacing:-.5px}
  .kpi .sub{font-size:11.5px;color:var(--dim);margin-top:3px}
  .kpi .val.g{color:var(--green)} .kpi .val.r{color:var(--loss)}

  /* Network Alerts */
  .alerts-head{display:flex;align-items:baseline;gap:10px;margin:2px 0 12px}
  .alerts-head h3{font-size:16px;font-weight:700;margin:0}
  .alerts-head .cnt{font-size:12px;color:var(--dim)}
  .alerts{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:14px;margin-bottom:24px}
  .alert{background:var(--surface);border:1px solid var(--border);border-radius:12px;
    padding:15px 17px 15px 18px;position:relative;overflow:hidden;display:flex;gap:13px;align-items:flex-start}
  .alert::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px}
  .alert.red::before{background:var(--loss)}
  .alert.yellow::before{background:var(--c3)}
  .alert.green::before{background:var(--green)}
  .alert .ic{font-size:21px;line-height:1;flex:none;margin-top:1px}
  .alert .body{flex:1;min-width:0}
  .alert .hl{font-size:13.5px;font-weight:700;letter-spacing:.1px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .alert .tag{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;padding:2px 8px;border-radius:20px;flex:none}
  .alert.red .tag{background:rgba(255,82,82,.15);color:var(--loss)}
  .alert.yellow .tag{background:rgba(255,176,32,.16);color:var(--c3)}
  .alert.green .tag{background:rgba(0,230,118,.14);color:var(--green)}
  .alert .metric{font-size:12.5px;margin-top:6px;color:var(--text);line-height:1.45}
  .alert .metric b{font-variant-numeric:tabular-nums;font-weight:700}
  .alert.red .metric b{color:var(--loss)} .alert.yellow .metric b{color:var(--c3)} .alert.green .metric b{color:var(--green)}
  .alert .act{font-size:11.5px;color:var(--muted);margin-top:7px;line-height:1.5}
  .alert .act b{color:var(--text);font-weight:600}
  .alert.green{grid-column:1/-1}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 22px;margin-bottom:20px}
  .card h3{margin:0 0 2px;font-size:15.5px;font-weight:700}
  .card .csub{margin:0 0 16px;font-size:12.5px;color:var(--muted)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  .grid2>.card{margin-bottom:0}
  @media(max-width:860px){.grid2{grid-template-columns:1fr}}

  .legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:14px}
  .legend .item{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted)}
  .legend .swatch{width:11px;height:11px;border-radius:3px;flex:none}
  .legend .swatch.line{height:3px;border-radius:2px;width:16px}

  svg.chart{display:block;width:100%;height:auto;overflow:visible}
  .chart-wrap{position:relative}
  .axis text{fill:var(--dim);font-size:11px;font-variant-numeric:tabular-nums}
  .grid line{stroke:var(--border);stroke-width:1;shape-rendering:crispEdges}
  .grid line.zero{stroke:var(--border2)}
  .dlabel{fill:var(--text);font-size:10.5px;font-weight:600;font-variant-numeric:tabular-nums}

  .tt{position:absolute;pointer-events:none;background:#000;border:1px solid var(--border2);
    border-radius:9px;padding:9px 11px;font-size:12px;color:var(--text);opacity:0;transition:opacity .08s;
    z-index:20;min-width:120px;box-shadow:0 8px 24px rgba(0,0,0,.6)}
  .tt .tt-title{font-weight:700;margin-bottom:5px;font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .tt .tt-row{display:flex;align-items:center;gap:7px;justify-content:space-between;margin-top:2px}
  .tt .tt-row .k{display:flex;align-items:center;gap:6px;color:var(--muted)}
  .tt .tt-row .k .sw{width:9px;height:9px;border-radius:2px;flex:none}
  .tt .tt-row .v{font-weight:700;font-variant-numeric:tabular-nums}

  table.tbl{width:100%;border-collapse:collapse;font-size:12.5px}
  table.tbl th,table.tbl td{padding:9px 12px;text-align:right;border-bottom:1px solid var(--border);white-space:nowrap}
  table.tbl th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.4px;position:sticky;top:0}
  table.tbl th:first-child,table.tbl td:first-child{text-align:left}
  table.tbl td{font-variant-numeric:tabular-nums}
  table.tbl tr:hover td{background:var(--surface2)}
  table.tbl td .chip{display:inline-flex;align-items:center;gap:6px}
  table.tbl td .sw{width:9px;height:9px;border-radius:2px;flex:none}
  .tbl-scroll{overflow-x:auto}
  .pos{color:var(--green)} .neg{color:var(--loss)}
  .pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
  .pill.good{background:rgba(0,230,118,.14);color:var(--green)}
  .pill.bad{background:rgba(255,82,82,.14);color:var(--loss)}
  .pill.mid{background:rgba(255,176,32,.14);color:var(--c3)}
  /* Follow-Up Queue priority bands, by days since inquiry */
  .pill.p90{background:rgba(255,82,82,.16);color:#ff5252}
  .pill.p30{background:rgba(255,140,66,.16);color:#ff8c42}
  .pill.p7{background:rgba(255,176,32,.16);color:#ffb020}
  .pill.p0{background:rgba(0,230,118,.14);color:#00e676}
  td.prio{border-left:3px solid transparent}
  /* Follow-Up Queue state accordion (mirrors the Lead Pipeline dashboard's queue) */
  .qs-wrap{border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--surface)}
  .qs-group{border-bottom:1px solid var(--border)}
  .qs-group:last-child{border-bottom:none}
  .qs-hdr{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;user-select:none;transition:background .15s}
  .qs-hdr:hover{background:rgba(255,255,255,.03)}
  .qs-hdr.open{background:rgba(59,167,255,.05)}
  .qs-caret{font-size:9px;color:var(--dim);width:12px;flex-shrink:0;transition:transform .18s}
  .qs-hdr.open .qs-caret{transform:rotate(90deg);color:var(--c2)}
  .qs-name{font-weight:600;font-size:13px;flex:1;color:var(--text)}
  .qs-pill{display:inline-block;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:600;margin-left:4px}
  .qs-pill-tot{background:rgba(59,167,255,.14);color:var(--c2)}
  .qs-pill-risk{background:rgba(255,82,82,.14);color:var(--loss)}
  .qs-pill-ok{background:rgba(0,230,118,.1);color:var(--green)}
  .qs-body{border-top:1px solid var(--border)}
  .qs-body table.tbl th{position:static;background:var(--surface2)}
  .qs-pgbar{display:flex;align-items:center;gap:8px;padding:8px 14px;border-top:1px solid var(--border);font-size:11px;color:var(--dim)}
  .qs-pgbtn{background:var(--surface3);border:1px solid var(--border2);color:var(--muted);padding:3px 10px;border-radius:4px;font-size:11px;cursor:pointer}
  .qs-pgbtn:disabled{opacity:.35;cursor:default}
  .qs-pgbtn:not(:disabled):hover{background:var(--border)}

  .note{font-size:11.5px;color:var(--dim);margin-top:14px;padding-top:12px;border-top:1px solid var(--border);line-height:1.6}
  .note b{color:var(--muted)}
  .note.bad{border-top:none;margin-top:14px;padding:11px 13px;border-left:3px solid var(--loss);background:rgba(255,82,82,.06);border-radius:0 6px 6px 0}
  .note.bad b{color:var(--loss)}

  /* ---- Animated conversion funnel ---- */
  .fnl{max-width:660px;margin:2px auto 0;padding:2px 0}
  .fnl-stage{display:flex;justify-content:center}
  .fnl-bar{
    position:relative;width:var(--w);min-width:132px;height:46px;border-radius:9px;
    background:var(--c);color:#0a0a0a;font-weight:700;
    display:flex;align-items:center;justify-content:space-between;padding:0 16px;
    box-shadow:0 3px 12px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.28);
    opacity:0;transform:scaleX(.05) translateY(-18px);transform-origin:center;
    transition:transform .68s cubic-bezier(.2,1.05,.32,1),opacity .45s ease;
  }
  .fnl-bar::after{content:"";position:absolute;inset:0;border-radius:9px;
    background:linear-gradient(180deg,rgba(255,255,255,.22),rgba(0,0,0,.08));pointer-events:none}
  .fnl.play .fnl-bar{opacity:1;transform:scaleX(1) translateY(0)}
  .fnl-name{position:relative;z-index:1;font-size:13px;letter-spacing:.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .fnl-val{position:relative;z-index:1;font-size:14px;font-variant-numeric:tabular-nums;white-space:nowrap;padding-left:10px}
  .fnl-drop{position:relative;height:32px;display:flex;align-items:center;justify-content:center}
  .fnl-drop-badge{position:relative;z-index:2;font-size:11px;font-weight:600;color:var(--muted);
    background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:2px 11px;
    font-variant-numeric:tabular-nums;opacity:0;transition:opacity .4s ease}
  .fnl.play .fnl-drop-badge{opacity:1}
  .fnl-dot{position:absolute;left:50%;top:1px;width:6px;height:6px;border-radius:50%;background:var(--c);opacity:0;box-shadow:0 0 6px var(--c)}
  .fnl.play .fnl-dot{animation:fnlFall 1.05s ease-in infinite}
  @keyframes fnlFall{
    0%{opacity:0;transform:translate(-50%,-8px) scale(.5)}
    18%{opacity:.95}
    82%{opacity:.95}
    100%{opacity:0;transform:translate(-50%,28px) scale(1)}
  }
  .fnl-legend{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:14px;font-size:11px;color:var(--muted)}
  .fnl-legend .bar{height:8px;width:130px;border-radius:5px;background:linear-gradient(90deg,#00e676,#c2e021,#ffd23f,#ff8534,#ff3b30)}

  .reco{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}
  .reco .r{background:var(--surface2);border:1px solid var(--border);border-radius:11px;padding:15px 16px;border-left:3px solid var(--c3)}
  .reco .r.up{border-left-color:var(--green)} .reco .r.down{border-left-color:var(--loss)}
  .reco .r .rt{font-weight:700;font-size:13.5px;margin-bottom:5px;display:flex;align-items:center;gap:8px}
  .reco .r .rt .tag{font-size:10px;padding:2px 7px;border-radius:5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
  .reco .r.up .tag{background:rgba(0,230,118,.16);color:var(--green)}
  .reco .r.down .tag{background:rgba(255,82,82,.16);color:var(--loss)}
  .reco .r.hold .tag{background:rgba(255,176,32,.16);color:var(--c3)}
  .reco .r p{margin:0;font-size:12.5px;color:var(--muted);line-height:1.55}
  .bench-line{stroke:var(--c3);stroke-width:1.5;stroke-dasharray:5 4}

  /* ---- Best month for closings: 12-month award-date strip + callout ---- */
  .mon-strip{display:grid;grid-template-columns:repeat(12,1fr);gap:6px;align-items:end;margin-top:4px}
  .mon{display:flex;flex-direction:column;align-items:center;gap:5px;min-width:0}
  .mon-v{font-size:12px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums}
  .mon-track{width:100%;height:96px;background:var(--surface3);border-radius:6px;display:flex;align-items:flex-end;overflow:hidden}
  .mon-fill{width:100%;background:var(--c2);border-radius:6px;min-height:2px;opacity:.9}
  .mon.top .mon-fill{background:var(--green)}
  .mon.top .mon-v{color:var(--green)}
  .mon.zero .mon-v{color:var(--dim)}
  .mon.zero .mon-fill{min-height:0}   /* a month with no closings must show no bar at all */
  .mon-l{font-size:11px;color:var(--muted)}
  .mon.top .mon-l{color:var(--green);font-weight:700}
  .callout{display:flex;align-items:center;gap:16px;margin-top:18px;padding:15px 17px;background:var(--surface2);
    border:1px solid var(--border);border-left:3px solid var(--green);border-radius:11px}
  .callout .co-big{font-size:27px;font-weight:800;color:var(--green);line-height:1;flex:none;letter-spacing:-.5px}
  .callout .co-txt{font-size:12.5px;color:var(--muted);line-height:1.55}
  .callout .co-txt b{color:var(--text)}
  @media(max-width:640px){
    .mon-strip{grid-template-columns:repeat(6,1fr);row-gap:14px}
    .callout{flex-direction:column;align-items:flex-start;gap:9px}
  }

  /* ---- Geographic choropleth ---- */
  .card-hd{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap}
  .card-hd .card-hd-t{min-width:0}
  .seg{display:inline-flex;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:3px;gap:2px;flex:none}
  .seg button{background:none;border:none;color:var(--muted);font-size:12px;font-weight:600;font-family:inherit;
    padding:6px 12px;border-radius:7px;cursor:pointer;white-space:nowrap;transition:background .15s,color .15s}
  .seg button:hover{color:var(--text)}
  .seg button.active{background:var(--surface3);color:var(--green)}
  svg.usmap{display:block;width:100%;max-width:900px;height:auto;margin:2px auto 0}
  .usmap .st{stroke:var(--surface);stroke-width:.8;cursor:pointer}
  .usmap #stHi{stroke:#fff;stroke-width:1.8;stroke-linejoin:round}
  .usmap .dc-lead{stroke:var(--border2);stroke-width:1;fill:none}
  .usmap .mlbl{fill:#fff;font-size:11px;font-weight:700;text-anchor:middle;pointer-events:none;
    font-variant-numeric:tabular-nums;paint-order:stroke;stroke:rgba(0,0,0,.6);stroke-width:2.5px;stroke-linejoin:round}
  .map-legend{align-items:center;gap:10px}
  .map-legend .lgd{color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:.5px;font-size:10px}
  .map-legend .item{gap:6px}

  /* ---- Upload toolbar ---- */
  .upload-bar{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;gap:7px;background:var(--surface2);color:var(--text);
    border:1px solid var(--border2);border-radius:9px;padding:8px 13px;font-size:12.5px;font-weight:600;
    font-family:inherit;cursor:pointer;white-space:nowrap;transition:background .15s,border-color .15s}
  .btn:hover{background:var(--surface3);border-color:#4a4a4a}
  .btn svg{width:14px;height:14px;flex:none}
  .btn.primary{border-color:var(--green-dim);color:var(--green)}
  .btn.primary:hover{background:rgba(0,230,118,.08)}
  .btn.ghost{background:none;border-color:var(--border);color:var(--muted)}
  .btn.ghost:hover{color:var(--text);border-color:var(--border2)}
  .btn[disabled]{opacity:.45;cursor:not-allowed}
  .updated-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--c3);margin-left:5px;vertical-align:middle}
  .toast{position:fixed;right:20px;bottom:20px;z-index:200;max-width:360px;display:flex;flex-direction:column;gap:8px}
  .toast .msg{background:#141414;border:1px solid var(--border2);border-left-width:3px;border-radius:10px;
    padding:11px 14px;font-size:12.5px;color:var(--text);box-shadow:0 10px 30px rgba(0,0,0,.55);animation:slideIn .2s ease}
  .toast .msg.ok{border-left-color:var(--green)}
  .toast .msg.err{border-left-color:var(--loss)}
  .toast .msg.info{border-left-color:var(--c2)}
  .toast .msg .tt2{font-weight:700;margin-bottom:2px}
  .toast .msg .sub2{color:var(--muted);font-size:11.5px;line-height:1.5}
  @keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @media(max-width:720px){.head-meta{display:none}}
</style>

<header class="top">
  <div class="head-inner">
    <img id="logo" alt="X Golf">
    <div class="head-titles">
      <h1>Marketing Performance Dashboard</h1>
      <p>X Golf America</p>
    </div>
    <div class="head-spacer"></div>
    <div class="upload-bar">
      <button class="btn primary" id="btnPL" title="Upload one or more monthly P&amp;L Excel files">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="M7 8l5-5 5 5"/><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
        Upload Monthly P&amp;L
      </button>
      <button class="btn" id="btnCRM" title="Upload an updated CRM Export.xlsx">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="M7 8l5-5 5 5"/><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
        Upload CRM Export
      </button>
      <button class="btn ghost" id="btnClear" title="Revert to the original embedded data" hidden>Clear Uploaded Data</button>
      <input type="file" id="filePL" accept=".xlsx" multiple hidden>
      <input type="file" id="fileCRM" accept=".xlsx" hidden>
    </div>
    <div class="head-meta">
      Franchise Marketing Fund &amp; Lead Analytics<br>
      Data through <b id="metaSpend">Dec 2025</b> · Leads through <b id="metaLeads">2026</b>
    </div>
  </div>
</header>
<div class="toast" id="toast"></div>

// ============================== LIVE (mutable) DATA VIEW ==============================
// These working variables are what every tab builder reads. They start as clones of the
// embedded BASE_* data and are recomputed by rebuildAll() whenever data is uploaded/cleared.
let MONTHS, MONTH_KEYS, ENTITIES, ENTITY_COLORS, LEADS_2025, SPEND_RANGE, SINGLE_YEAR;
let CHANNELS, DEAD_BY_CHANNEL, LEAD_STATUS, LEADS_BY_YEAR, DEALS_BY_AWARD_YEAR, DEALS_BY_AWARD_MONTH, TOTAL_LEADS, CLOSED_DEALS;
let RATING_BY_CHANNEL, TTC_BY_CHANNEL; // lead-rating distribution & inquiry→award timing, per channel
let RESPONSE; // response-time aggregate (see BASE_RESPONSE shape)
let FOLLOWUP=[]; // Follow-Up Queue tab: [{name,city,state,status,src,rating,inqDay,respDays}] active leads only
let STATES=[];      // [{s,r,l,w}] US states with ≥1 lead, sorted by leads desc
let STATE_META={};  // {usLeads,usWon,nonUsLeads,nonUsCount,blankLeads,total}
let BUDGET_Q=null;  // Budget Recommendations tab: user-set quarterly budget (survives rebuilds)

// Canonical stores that survive across uploads
let spendStore = {};              // "YYYY-MM" -> { entityName: value }
let crmRecords = new Map();       // dedup key -> { inqYear, inqMonth, status, reason, channel, awardYear }
let crmUploaded = false;
let plUploaded  = false;

const clone=(o)=>JSON.parse(JSON.stringify(o));
const mkKey=(y,m)=>y+"-"+String(m).padStart(2,"0");

// ---- Seed spendStore from embedded 2025 monthly P&L data ----
function seedBaseSpend(){
  spendStore={};
  for(let m=0;m<12;m++){
    const key=mkKey(2025,m+1), obj={};
    Object.keys(BASE_ENTITIES).forEach(e=>{ obj[e]=BASE_ENTITIES[e][m]; });
    spendStore[key]=obj;
  }
}

// ---- Derive spend-based working vars (MONTHS, ENTITIES, colors) from spendStore ----
function applySpend(){
  MONTH_KEYS=Object.keys(spendStore).sort();
  const years=[...new Set(MONTH_KEYS.map(k=>+k.split("-")[0]))].sort();
  const multiYear=years.length>1;
  MONTHS=MONTH_KEYS.map(k=>{const [y,m]=k.split("-");return MONTH_NAMES[+m-1]+(multiYear?" '"+y.slice(2):"");});
  SPEND_RANGE=years.length?(multiYear?years[0]+"–"+years[years.length-1]:""+years[0]):"";
  SINGLE_YEAR=(years.length===1?""+years[0]:"");
  // entity universe: base order first, then any new entities in upload order
  const seen=new Set(), order=[];
  Object.keys(BASE_ENTITY_COLORS).forEach(e=>{order.push(e);seen.add(e);});
  MONTH_KEYS.forEach(k=>Object.keys(spendStore[k]).forEach(e=>{if(!seen.has(e)){order.push(e);seen.add(e);}}));
  // keep only entities that actually appear somewhere
  const present=new Set(); MONTH_KEYS.forEach(k=>Object.keys(spendStore[k]).forEach(e=>present.add(e)));
  ENTITIES={}; ENTITY_COLORS={}; let ci=0;
  order.filter(e=>present.has(e)).forEach(e=>{
    ENTITIES[e]=MONTH_KEYS.map(k=>{const v=spendStore[k][e];return typeof v==="number"?v:0;});
    ENTITY_COLORS[e]=BASE_ENTITY_COLORS[e]||EXTRA_COLORS[ci++%EXTRA_COLORS.length];
  });
}

// ---- Roll CRM records up into the per-state shape (mirrors BASE_STATES / BASE_STATE_META) ----
function computeStates(recs){
  const m={}; let nonUsLeads=0, nonUs=new Set(), blank=0, usLeads=0, usWon=0;
  recs.forEach(r=>{
    const st=(r.state||"").trim();
    if(!st){ blank++; return; }
    if(STATE_TO_REGION[st]){
      const o=m[st]||(m[st]={s:st,r:STATE_TO_REGION[st],l:0,w:0});
      o.l++; usLeads++; if(r.sold){ o.w++; usWon++; }
    } else { nonUsLeads++; nonUs.add(st); }
  });
  STATES=Object.values(m).sort((a,b)=>b.l-a.l||a.s.localeCompare(b.s));
  STATE_META={usLeads,usWon,nonUsLeads,nonUsCount:nonUs.size,blankLeads:blank,total:recs.length};
}

// ---- Derive lead-based working vars from crmRecords (or restore embedded) ----
function applyLeads(){
  if(crmUploaded){
    const recs=[...crmRecords.values()];
    // status buckets
    const statusOrder=["Dead Lead","Contacted","Nurture","Intro Call","Closed — Sold","Other (pipeline)"];
    LEAD_STATUS={}; statusOrder.forEach(s=>LEAD_STATUS[s]=0);
    // channels
    const chLeads={}, chWon={}, dead={}, rating={}, ttc={};
    const mkRating=()=>({Hot:0,Warm:0,Cold:0,Unrated:0}), mkTtc=()=>({won:0,days:[]});
    CHANNEL_ORDER.forEach(c=>{chLeads[c]=0;chWon[c]=0;dead[c]={};rating[c]=mkRating();ttc[c]=mkTtc();});
    LEADS_BY_YEAR={}; DEALS_BY_AWARD_YEAR={}; DEALS_BY_AWARD_MONTH=new Array(12).fill(0); CLOSED_DEALS=0;
    const leadsByKey={};
    recs.forEach(r=>{
      LEAD_STATUS[r.statusBucket]=(LEAD_STATUS[r.statusBucket]||0)+1;
      if(chLeads[r.channel]==null){chLeads[r.channel]=0;chWon[r.channel]=0;dead[r.channel]={};rating[r.channel]=mkRating();ttc[r.channel]=mkTtc();}
      chLeads[r.channel]++;
      const rt=(r.rating==="Hot"||r.rating==="Warm"||r.rating==="Cold")?r.rating:"Unrated";
      rating[r.channel][rt]++;
      if(r.inqYear){LEADS_BY_YEAR[r.inqYear]=(LEADS_BY_YEAR[r.inqYear]||0)+1;
        if(r.inqMonth){const k=mkKey(r.inqYear,r.inqMonth);leadsByKey[k]=(leadsByKey[k]||0)+1;}}
      if(r.sold){CLOSED_DEALS++; chWon[r.channel]++; ttc[r.channel].won++;
        if(r.awardDay!=null&&r.inqDay!=null&&r.awardDay>=r.inqDay)ttc[r.channel].days.push(r.awardDay-r.inqDay);
        if(r.awardYear)DEALS_BY_AWARD_YEAR[r.awardYear]=(DEALS_BY_AWARD_YEAR[r.awardYear]||0)+1;
        if(r.awardMonth)DEALS_BY_AWARD_MONTH[r.awardMonth-1]++;}
      if(r.statusBucket==="Dead Lead"){const g=r.reasonGroup;dead[r.channel][g]=(dead[r.channel][g]||0)+1;}
    });
    CHANNELS=CHANNEL_ORDER.map(c=>({name:c,leads:chLeads[c]||0,won:chWon[c]||0}));
    DEAD_BY_CHANNEL=dead;
    RATING_BY_CHANNEL=rating;
    TTC_BY_CHANNEL=ttc;
    TOTAL_LEADS=recs.length;
    LEADS_2025=MONTH_KEYS.map(k=>leadsByKey[k]||0);
    computeStates(recs);
  } else {
    LEAD_STATUS=clone(BASE_LEAD_STATUS);
    CHANNELS=clone(BASE_CHANNELS);
    DEAD_BY_CHANNEL=clone(BASE_DEAD_BY_CHANNEL);
    RATING_BY_CHANNEL=clone(BASE_RATING_BY_CHANNEL);
    TTC_BY_CHANNEL=clone(BASE_TTC_BY_CHANNEL);
    LEADS_BY_YEAR=clone(BASE_LEADS_BY_YEAR);
    DEALS_BY_AWARD_YEAR=clone(BASE_DEALS_BY_AWARD_YEAR);
    DEALS_BY_AWARD_MONTH=clone(BASE_DEALS_BY_AWARD_MONTH);
    TOTAL_LEADS=BASE_TOTAL_LEADS;
    CLOSED_DEALS=BASE_CLOSED_DEALS;
    // map embedded 2025 monthly leads onto the current month axis
    const baseByKey={}; for(let m=0;m<12;m++)baseByKey[mkKey(2025,m+1)]=BASE_LEADS_2025[m];
    LEADS_2025=MONTH_KEYS.map(k=>baseByKey[k]!=null?baseByKey[k]:0);
    STATES=clone(BASE_STATES);
    STATE_META=Object.assign({usLeads:sum(BASE_STATES.map(s=>s.l)),usWon:sum(BASE_STATES.map(s=>s.w))},BASE_STATE_META);
  }
}

// ---- Roll uploaded CRM records up into the response-time aggregate shape (mirrors BASE_RESPONSE) ----
function aggregateResponse(recs){
  const blank=()=>({leads:0,contacted:0,never:0,sumDays:0});
  const agg={total:0,contactedCount:0,contactedSum:0,neverCount:0,within7Count:0,
    convContactedCount:0,convSum:0,deadContactedCount:0,deadSum:0,convTotal:0,deadTotal:0,
    dist:{}, convByBucket:{}, bySource:{}, byRating:{}, monthly:{}};
  [...RESPONSE_BUCKETS,"never"].forEach(b=>{agg.dist[b]=0;agg.convByBucket[b]=0;});
  RATING_ORDER.forEach(rt=>{agg.byRating[rt]=blank();});
  const bkey=(r)=>{ if(!r.contacted) return "never"; const d=r.respDays;
    return d<=7?"0-7":d<=14?"8-14":d<=30?"15-30":d<=60?"31-60":"60+"; };
  recs.forEach(r=>{
    agg.total++;
    const src=agg.bySource[r.channel]||(agg.bySource[r.channel]=blank());
    src.leads++;
    const rt=ratingKey(r.rating); const rat=agg.byRating[rt]||(agg.byRating[rt]=blank());
    rat.leads++;
    if(r.sold)agg.convTotal++; if(r.statusBucket==="Dead Lead")agg.deadTotal++;
    const b=bkey(r); agg.dist[b]=(agg.dist[b]||0)+1; if(r.sold)agg.convByBucket[b]=(agg.convByBucket[b]||0)+1;
    let mo=null;
    if(r.inqYear&&r.inqMonth){ const k=mkKey(r.inqYear,r.inqMonth); mo=agg.monthly[k]||(agg.monthly[k]={total:0,contacted:0,never:0,sumDays:0}); mo.total++; }
    if(r.contacted){
      const d=r.respDays;
      agg.contactedCount++; agg.contactedSum+=d; src.contacted++; src.sumDays+=d;
      rat.contacted++; rat.sumDays+=d;
      if(d<=7)agg.within7Count++;
      if(r.sold){agg.convContactedCount++;agg.convSum+=d;}
      if(r.statusBucket==="Dead Lead"){agg.deadContactedCount++;agg.deadSum+=d;}
      if(mo){mo.contacted++;mo.sumDays+=d;}
    } else { agg.neverCount++; src.never++; rat.never++; if(mo)mo.never++; }
  });
  return agg;
}

// ---- Derive response-time working var from crmRecords (or restore embedded) ----
function applyResponse(){
  RESPONSE = crmUploaded ? aggregateResponse([...crmRecords.values()]) : clone(BASE_RESPONSE);
}

// ---- Derive the active-lead list the Follow-Up Queue tab reads (or restore embedded) ----
// Active = Lead Status is a live pipeline stage; Dead Lead / Closed Lead- Sold need no follow-up.
const FU_ACTIVE_STATUS=["Contacted","Nurture","Intro Call","Discovery","FDD Review","Approved"];
function applyFollowup(){
  if(crmUploaded){
    FOLLOWUP=[...crmRecords.values()].filter(r=>FU_ACTIVE_STATUS.includes(r.status)&&r.inqDay!=null)
      .map(r=>({name:r.name||"(no name)",city:r.city||"",state:r.state||"",status:r.status,
        src:r.channel,rating:r.rating||"",inqDay:r.inqDay,respDays:r.respDays}));
  } else {
    FOLLOWUP=BASE_FOLLOWUP_ROWS.map(a=>({name:a[0],city:a[1],state:a[2],status:FU_STATUS[a[3]],
      src:FU_SRC[a[4]],rating:FU_RATING[a[5]],inqDay:a[6],respDays:a[7]}));
  }
  FOLLOWUP.sort((a,b)=>a.inqDay-b.inqDay||a.name.localeCompare(b.name));
}

// ============================== FORMAT HELPERS ==============================
const fmtUSD=(v)=>{const s=v<0?"-":"";v=Math.abs(v);
  if(v>=1e6)return s+"$"+(v/1e6).toFixed(2).replace(/\.?0+$/,"")+"M";
  if(v>=1e3)return s+"$"+(v/1e3).toFixed(0)+"K"; return s+"$"+v.toFixed(0);};
const fmtUSDfull=(v)=>(v<0?"-$":"$")+Math.abs(v).toLocaleString("en-US",{maximumFractionDigits:0});
const fmtPct=(v,d=1)=>v.toFixed(d)+"%";
const fmtNum=(v)=>v.toLocaleString("en-US");
const sum=a=>a.reduce((x,y)=>x+y,0);

function niceTicks(min,max,n=5){
  if(min===max){max=min+1;}
  const span=max-min, step0=span/n, mag=Math.pow(10,Math.floor(Math.log10(step0)));
  const norm=step0/mag; let step;
  if(norm<1.5)step=1;else if(norm<3)step=2;else if(norm<7)step=5;else step=10;
  step*=mag;
  const lo=Math.floor(min/step)*step, hi=Math.ceil(max/step)*step;
  const ticks=[]; for(let v=lo;v<=hi+step/2;v+=step)ticks.push(Math.round(v*1e6)/1e6);
  return {ticks,lo,hi};
}

// tooltip singleton per chart-wrap
function attachTip(wrap){
  let tip=wrap.querySelector(".tt");
  if(!tip){tip=document.createElement("div");tip.className="tt";wrap.appendChild(tip);}
  return tip;
}
function moveTip(tip,wrap,x,y){
  const w=wrap.clientWidth, tw=tip.offsetWidth;
  let left=x+14; if(left+tw>w)left=x-tw-14; if(left<0)left=4;
  tip.style.left=left+"px"; tip.style.top=Math.max(0,y-10)+"px";
}

// ============================== CHART: MULTI-LINE ==============================
function lineChart(el,{labels,series,yFmt=fmtUSD,tipFmt=fmtUSDfull,height=300,directLabelLast=false,zeroBaseline=true,xTickEvery=1}){
  const W=760,H=height,padL=64,padR=directLabelLast?96:22,padT=16,padB=34;
  let allv=[]; series.forEach(s=>allv.push(...s.data));
  let mn=Math.min(...allv,zeroBaseline?0:Math.min(...allv)),mx=Math.max(...allv);
  const {ticks,lo,hi}=niceTicks(mn,mx,5);
  const xw=W-padL-padR, yh=H-padT-padB;
  const X=i=>padL+(labels.length===1?xw/2:xw*i/(labels.length-1));
  const Y=v=>padT+yh*(1-(v-lo)/(hi-lo));
  let g=`<svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" role="img">`;
  g+='<g class="grid">';
  ticks.forEach(t=>{g+=`<line class="${t===0?'zero':''}" x1="${padL}" y1="${Y(t)}" x2="${W-padR}" y2="${Y(t)}"/>`;});
  g+='</g><g class="axis">';
  ticks.forEach(t=>{g+=`<text x="${padL-9}" y="${Y(t)+4}" text-anchor="end">${yFmt(t)}</text>`;});
  labels.forEach((l,i)=>{ if(xTickEvery>1 && i%xTickEvery!==0 && i!==labels.length-1) return;
    g+=`<text x="${X(i)}" y="${H-12}" text-anchor="middle">${l}</text>`;});
  g+='</g>';
  series.forEach(s=>{
    let d=s.data.map((v,i)=>(i?'L':'M')+X(i).toFixed(1)+' '+Y(v).toFixed(1)).join(' ');
    g+=`<path d="${d}" fill="none" stroke="${s.color}" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>`;
    s.data.forEach((v,i)=>{g+=`<circle cx="${X(i)}" cy="${Y(v)}" r="3.2" fill="var(--bg)" stroke="${s.color}" stroke-width="2"/>`;});
    if(directLabelLast){const li=s.data.length-1;g+=`<text class="dlabel" x="${X(li)+9}" y="${Y(s.data[li])+4}" fill="${s.color}">${s.name}</text>`;}
  });
  // hover
  g+=`<g id="hoverg" style="opacity:0"><line stroke="var(--border2)" stroke-width="1" y1="${padT}" y2="${padT+yh}"/></g>`;
  g+=`<rect x="${padL}" y="${padT}" width="${xw}" height="${yh}" fill="transparent" id="hit"/>`;
  g+='</svg>';
  el.innerHTML=g;
  const svg=el.querySelector("svg"),wrap=el;wrap.classList.add("chart-wrap");
  const tip=attachTip(wrap),hov=svg.querySelector("#hoverg"),vline=hov.querySelector("line");
  const hit=svg.querySelector("#hit");
  hit.addEventListener("mousemove",e=>{
    const r=svg.getBoundingClientRect(),sx=(e.clientX-r.left)/r.width*W;
    let i=Math.round((sx-padL)/(xw/(labels.length-1)));i=Math.max(0,Math.min(labels.length-1,i));
    hov.style.opacity=1;vline.setAttribute("x1",X(i));vline.setAttribute("x2",X(i));
    let rows=series.map(s=>`<div class="tt-row"><span class="k"><span class="sw" style="background:${s.color}"></span>${s.name}</span><span class="v">${tipFmt(s.data[i])}</span></div>`).join("");
    tip.innerHTML=`<div class="tt-title">${labels[i]}</div>${rows}`;tip.style.opacity=1;
    const px=(e.clientX-r.left)/r.width*wrap.clientWidth,py=(e.clientY-r.top)/r.height*(H)*(wrap.clientWidth/W);
    moveTip(tip,wrap,px,py);
  });
  hit.addEventListener("mouseleave",()=>{tip.style.opacity=0;hov.style.opacity=0;});
}

// ============================== CHART: BARS (single, signed) ==============================
// overlay (optional): {data:[…|null], color, label, barLabel, tipFmt?} draws a trend line
// on the SAME y-axis as the bars (e.g. a rolling average of the same values) plus a legend.
function barChart(el,{labels,data,color="#00e676",negColor="#ff5252",yFmt=fmtUSD,tipFmt=fmtUSDfull,height=300,unit="",overlay=null}){
  const W=760,H=height,padL=64,padR=22,padT=18,padB=34;
  const mn=Math.min(0,...data),mx=Math.max(0,...data);
  const {ticks,lo,hi}=niceTicks(mn,mx,5);
  const xw=W-padL-padR,yh=H-padT-padB;
  const n=data.length,slot=xw/n,bw=Math.min(46,slot*0.62);
  const X=i=>padL+slot*i+slot/2;
  const Y=v=>padT+yh*(1-(v-lo)/(hi-lo));
  let g=`<svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">`;
  g+='<g class="grid">';
  ticks.forEach(t=>{g+=`<line class="${t===0?'zero':''}" x1="${padL}" y1="${Y(t)}" x2="${W-padR}" y2="${Y(t)}"/>`;});
  g+='</g><g class="axis">';
  ticks.forEach(t=>{g+=`<text x="${padL-9}" y="${Y(t)+4}" text-anchor="end">${yFmt(t)}</text>`;});
  labels.forEach((l,i)=>{g+=`<text x="${X(i)}" y="${H-12}" text-anchor="middle">${l}</text>`;});
  g+='</g>';
  const y0=Y(0);
  data.forEach((v,i)=>{
    const yv=Y(v),top=Math.min(yv,y0),h=Math.abs(yv-y0);
    const c=v<0?negColor:color;
    g+=`<rect class="bar" data-i="${i}" x="${X(i)-bw/2}" y="${top}" width="${bw}" height="${Math.max(h,0.5)}" rx="3" fill="${c}" opacity="0.9"/>`;
  });
  if(overlay){
    const oc=overlay.color;
    const pts=overlay.data.map((v,i)=>v==null?null:[X(i),Y(v)]).filter(Boolean);
    if(pts.length>1)g+=`<polyline fill="none" stroke="${oc}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" points="${pts.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ')}"/>`;
    pts.forEach(p=>{g+=`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="4" fill="${oc}" stroke="var(--bg)" stroke-width="1.5"/>`;});
  }
  g+='</svg>';
  if(overlay)g+=`<div class="legend"><span class="item"><span class="swatch" style="background:${color}"></span>${overlay.barLabel}</span><span class="item"><span class="swatch line" style="background:${overlay.color}"></span>${overlay.label}</span></div>`;
  el.innerHTML=g;el.classList.add("chart-wrap");
  const svg=el.querySelector("svg"),tip=attachTip(el);
  svg.querySelectorAll(".bar").forEach(b=>{
    b.addEventListener("mouseenter",()=>b.setAttribute("opacity","1"));
    b.addEventListener("mouseleave",()=>{b.setAttribute("opacity","0.9");tip.style.opacity=0;});
    b.addEventListener("mousemove",e=>{
      const i=+b.dataset.i,r=svg.getBoundingClientRect();
      const ov=overlay&&overlay.data[i]!=null?`<div class="tt-row"><span class="k"><span class="sw" style="background:${overlay.color}"></span>${overlay.label}</span><span class="v">${(overlay.tipFmt||tipFmt)(overlay.data[i])}</span></div>`:"";
      const barK=overlay?`<span class="sw" style="background:${color}"></span>${overlay.barLabel}`:(unit||"Value");
      tip.innerHTML=`<div class="tt-title">${labels[i]}</div><div class="tt-row"><span class="k">${barK}</span><span class="v" style="color:${data[i]<0?negColor:color}">${tipFmt(data[i])}</span></div>${ov}`;
      tip.style.opacity=1;
      moveTip(tip,el,(e.clientX-r.left)/r.width*el.clientWidth,(e.clientY-r.top)/r.height*el.clientHeight);
    });
  });
}

// ============================== CHART: GROUPED BARS (per-cluster normalized) ==============================
// One cluster per metric, one bar per series (e.g. year). The metrics live on very different scales
// (leads in the thousands, deals in single digits, rates < 1%, cost in the hundreds), so each cluster
// is normalized to its own maximum and the real value is printed above every bar. There is no shared
// y-axis; the bar height only encodes the within-cluster comparison. Tooltips show the formatted value.
function groupedBar(el,{groups,series,height=360}){
  const W=760,H=height,padL=20,padR=20,padT=30,padB=52;
  const xw=W-padL-padR, yh=H-padT-padB;
  const G=groups.length, B=series.length;
  const slotGap=0.30;                       // fraction of a group slot left empty between clusters
  const slot=xw/G, groupW=slot*(1-slotGap), bw=groupW/B;
  let g=`<svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">`;
  g+=`<line class="zero" x1="${padL}" y1="${padT+yh}" x2="${W-padR}" y2="${padT+yh}"/>`;
  groups.forEach((grp,gi)=>{
    const gx=padL+slot*gi+(slot-groupW)/2, cx=padL+slot*gi+slot/2;
    const mx=Math.max(...grp.values,1e-9);
    grp.values.forEach((v,bi)=>{
      const h=v<=0?0.5:yh*(v/mx);
      const x=gx+bw*bi, y=padT+yh-h;
      g+=`<rect class="gbar" data-g="${gi}" data-b="${bi}" x="${x+bw*0.12}" y="${y}" width="${bw*0.76}" height="${Math.max(h,0.5)}" rx="3" fill="${series[bi].color}" opacity="0.9"/>`;
      g+=`<text x="${x+bw/2}" y="${y-6}" text-anchor="middle" style="fill:var(--muted);font-size:10px;font-weight:600;font-variant-numeric:tabular-nums">${grp.fmt(v)}</text>`;
    });
    g+=`<text x="${cx}" y="${H-14}" text-anchor="middle" style="fill:var(--text);font-size:12.5px;font-weight:600">${grp.label}</text>`;
  });
  g+='</svg>';
  el.innerHTML=g;el.classList.add("chart-wrap");
  const svg=el.querySelector("svg"),tip=attachTip(el);
  svg.querySelectorAll(".gbar").forEach(b=>{
    b.addEventListener("mouseenter",()=>b.setAttribute("opacity","1"));
    b.addEventListener("mouseleave",()=>{b.setAttribute("opacity","0.9");tip.style.opacity=0;});
    b.addEventListener("mousemove",e=>{
      const gi=+b.dataset.g,bi=+b.dataset.b,grp=groups[gi],r=svg.getBoundingClientRect();
      tip.innerHTML=`<div class="tt-title">${grp.label}</div><div class="tt-row"><span class="k"><span class="sw" style="background:${series[bi].color}"></span>${series[bi].name}</span><span class="v">${grp.fmt(grp.values[bi])}</span></div>`;
      tip.style.opacity=1;
      moveTip(tip,el,(e.clientX-r.left)/r.width*el.clientWidth,(e.clientY-r.top)/r.height*el.clientHeight);
    });
  });
}

// ============================== CHART: HORIZONTAL BARS ==============================
function hBarChart(el,{items,valFmt=fmtUSDfull,maxLabel=""}){
  const max=Math.max(...items.map(i=>i.value),0.0001);
  let g='<div style="display:flex;flex-direction:column;gap:11px">';
  items.forEach(it=>{
    const pct=Math.max(0,it.value/max*100);
    g+=`<div style="display:flex;align-items:center;gap:12px">
      <div style="width:118px;flex:none;font-size:12.5px;color:var(--muted);text-align:right" title="${it.name}">${it.name}</div>
      <div style="flex:1;background:var(--surface3);border-radius:6px;height:22px;position:relative;overflow:hidden">
        <div style="width:${pct}%;height:100%;background:${it.color||'var(--green)'};border-radius:6px;min-width:2px;opacity:.92"></div>
      </div>
      <div style="width:96px;flex:none;font-size:12.5px;font-weight:700;font-variant-numeric:tabular-nums">${valFmt(it.value)}${it.suffix||""}</div>
    </div>`;
  });
  g+='</div>';el.innerHTML=g;
}

// ============================== CHART: STACKED HORIZONTAL (100%) ==============================
function stackedBar(el,{segments}){ // segments:[{label,value,color}]
  const tot=sum(segments.map(s=>s.value))||1;
  let bar='<div style="display:flex;height:26px;border-radius:7px;overflow:hidden;gap:2px;background:var(--bg)">';
  segments.forEach(s=>{const p=s.value/tot*100; if(p<=0)return;
    bar+=`<div title="${s.label}: ${fmtNum(s.value)} (${p.toFixed(1)}%)" style="width:${p}%;background:${s.color};min-width:1px"></div>`;});
  bar+='</div>';
  el.innerHTML=bar;
}

// ============================== CHART: DUAL PANEL (spend over leads, shared x) ==============================
// Two vertically-stacked panels sharing one month axis: spend (signed) on top, lead volume below.
// Months flagged as misaligned get a full-height tint band so the eye connects spend↔demand gaps.
function dualPanelChart(el2,{labels,spend,leads,status,tyLabel}){
  const W=760,H=384,padL=66,padR=18,padT=30,padB=30,panelGap=48;
  const innerH=H-padT-padB, panelH=(innerH-panelGap)/2;
  const topT=padT, botT=topT+panelH+panelGap;
  const sVals=spend.map(v=>v==null?0:v), lVals=leads.map(v=>v==null?0:v);
  const sT=niceTicks(Math.min(0,...sVals),Math.max(0,...sVals),4);
  const lT=niceTicks(0,Math.max(...lVals,1),4);
  const xw=W-padL-padR,n=labels.length,slot=xw/n,bw=Math.min(30,slot*0.46);
  const X=i=>padL+slot*i+slot/2;
  const Ys=v=>topT+panelH*(1-(v-sT.lo)/(sT.hi-sT.lo));
  const Yl=v=>botT+panelH*(1-(v-lT.lo)/(lT.hi-lT.lo));
  const hue={under:'rgba(0,230,118,.10)',over:'rgba(255,82,82,.11)',ok:'',na:''};
  let g=`<svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">`;
  status.forEach((st,i)=>{if(hue[st.s])g+=`<rect x="${X(i)-slot/2}" y="${topT}" width="${slot}" height="${botT+panelH-topT}" fill="${hue[st.s]}"/>`;});
  g+='<g class="grid">';
  sT.ticks.forEach(t=>g+=`<line class="${t===0?'zero':''}" x1="${padL}" y1="${Ys(t)}" x2="${W-padR}" y2="${Ys(t)}"/>`);
  lT.ticks.forEach(t=>g+=`<line class="${t===0?'zero':''}" x1="${padL}" y1="${Yl(t)}" x2="${W-padR}" y2="${Yl(t)}"/>`);
  g+='</g><g class="axis">';
  sT.ticks.forEach(t=>g+=`<text x="${padL-9}" y="${Ys(t)+4}" text-anchor="end">${fmtUSD(t)}</text>`);
  lT.ticks.forEach(t=>g+=`<text x="${padL-9}" y="${Yl(t)+4}" text-anchor="end">${fmtNum(t)}</text>`);
  labels.forEach((l,i)=>g+=`<text x="${X(i)}" y="${H-10}" text-anchor="middle">${l}</text>`);
  g+='</g>';
  g+=`<text x="${padL}" y="${topT-10}" style="fill:var(--muted);font-size:11px;font-weight:600">Marketing Spend · ${tyLabel}</text>`;
  g+=`<text x="${padL}" y="${botT-10}" style="fill:var(--muted);font-size:11px;font-weight:600">Lead Volume · ${tyLabel}</text>`;
  const sy0=Ys(0);
  spend.forEach((v,i)=>{if(v==null)return;const yv=Ys(v),top=Math.min(yv,sy0),h=Math.abs(yv-sy0);
    g+=`<rect x="${X(i)-bw/2}" y="${top}" width="${bw}" height="${Math.max(h,0.5)}" rx="2.5" fill="${v<0?'var(--loss)':'#00e676'}" opacity=".9"/>`;});
  const ly0=Yl(0);
  leads.forEach((v,i)=>{if(v==null)return;const yv=Yl(v);
    g+=`<rect x="${X(i)-bw/2}" y="${yv}" width="${bw}" height="${Math.max(ly0-yv,0.5)}" rx="2.5" fill="#3ba7ff" opacity=".9"/>`;});
  g+=`<rect x="${padL}" y="${topT}" width="${xw}" height="${botT+panelH-topT}" fill="transparent" id="hit"/></svg>`;
  el2.innerHTML=g;el2.classList.add("chart-wrap");
  const svg=el2.querySelector("svg"),tip=attachTip(el2),hit=svg.querySelector("#hit");
  const stTxt={under:'Underspent vs demand',over:'Overspent vs demand',ok:'Aligned',na:'No data'};
  hit.addEventListener("mousemove",e=>{const r=svg.getBoundingClientRect(),sx=(e.clientX-r.left)/r.width*W;
    let i=Math.floor((sx-padL)/slot);i=Math.max(0,Math.min(n-1,i));
    tip.innerHTML=`<div class="tt-title">${labels[i]}</div>
      <div class="tt-row"><span class="k"><span class="sw" style="background:#00e676"></span>Spend</span><span class="v">${spend[i]==null?'—':fmtUSDfull(spend[i])}</span></div>
      <div class="tt-row"><span class="k"><span class="sw" style="background:#3ba7ff"></span>Leads</span><span class="v">${leads[i]==null?'—':fmtNum(leads[i])}</span></div>
      <div class="tt-row"><span class="k">Status</span><span class="v">${stTxt[status[i].s]}</span></div>`;
    tip.style.opacity=1;
    moveTip(tip,el2,(e.clientX-r.left)/r.width*el2.clientWidth,(e.clientY-r.top)/r.height*el2.clientHeight);});
  hit.addEventListener("mouseleave",()=>tip.style.opacity=0);
}

// ============================== CHART: SCATTER + TREND LINE ==============================
// One point per month: x = marketing spend, y = lead volume. Least-squares trend line
// plus labeled, hoverable points. slope/intercept come from the caller's regression.
function scatterCorr(el2,{points,slope,intercept,xFmt=fmtUSD,yFmt=fmtNum,xTitle="",yTitle="",height=400}){
  const W=760,H=height,padL=66,padR=28,padT=22,padB=54;
  const xs=points.map(p=>p.x), ys=points.map(p=>p.y);
  const xT=niceTicks(Math.min(0,...xs),Math.max(...xs),5);
  const yT=niceTicks(0,Math.max(...ys,1),5);
  const xw=W-padL-padR, yh=H-padT-padB;
  const X=v=>padL+xw*(v-xT.lo)/(xT.hi-xT.lo);
  const Y=v=>padT+yh*(1-(v-yT.lo)/(yT.hi-yT.lo));
  let g=`<svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">`;
  g+='<g class="grid">';
  yT.ticks.forEach(t=>g+=`<line class="${t===0?'zero':''}" x1="${padL}" y1="${Y(t)}" x2="${W-padR}" y2="${Y(t)}"/>`);
  xT.ticks.forEach(t=>g+=`<line class="${t===0?'zero':''}" x1="${X(t)}" y1="${padT}" x2="${X(t)}" y2="${padT+yh}"/>`);
  g+='</g><g class="axis">';
  yT.ticks.forEach(t=>g+=`<text x="${padL-9}" y="${Y(t)+4}" text-anchor="end">${yFmt(t)}</text>`);
  xT.ticks.forEach(t=>g+=`<text x="${X(t)}" y="${padT+yh+18}" text-anchor="middle">${xFmt(t)}</text>`);
  g+='</g>';
  // axis titles
  g+=`<text x="${padL+xw/2}" y="${H-8}" text-anchor="middle" style="fill:var(--muted);font-size:11.5px;font-weight:600">${xTitle}</text>`;
  g+=`<text x="15" y="${padT+yh/2}" text-anchor="middle" transform="rotate(-90 15 ${padT+yh/2})" style="fill:var(--muted);font-size:11.5px;font-weight:600">${yTitle}</text>`;
  // least-squares trend line across the data's x-extent
  const xmin=Math.min(...xs),xmax=Math.max(...xs),ty=x=>slope*x+intercept;
  g+=`<line x1="${X(xmin)}" y1="${Y(ty(xmin))}" x2="${X(xmax)}" y2="${Y(ty(xmax))}" stroke="var(--c3)" stroke-width="2" stroke-dasharray="6 4" opacity=".9"/>`;
  // points + month labels
  points.forEach((p,i)=>{
    g+=`<circle class="pt" data-i="${i}" cx="${X(p.x)}" cy="${Y(p.y)}" r="5.5" fill="var(--green)" stroke="var(--bg)" stroke-width="1.5" opacity=".92"/>`;
    g+=`<text x="${X(p.x)+9}" y="${Y(p.y)+3.5}" style="fill:var(--muted);font-size:10.5px;font-weight:600;pointer-events:none">${p.label}</text>`;
  });
  g+='</svg>';
  el2.innerHTML=g;el2.classList.add("chart-wrap");
  const svg=el2.querySelector("svg"),tip=attachTip(el2);
  svg.querySelectorAll(".pt").forEach(c=>{
    c.addEventListener("mouseenter",()=>c.setAttribute("r","7.5"));
    c.addEventListener("mouseleave",()=>{c.setAttribute("r","5.5");tip.style.opacity=0;});
    c.addEventListener("mousemove",e=>{const i=+c.dataset.i,p=points[i],r=svg.getBoundingClientRect();
      tip.innerHTML=`<div class="tt-title">${p.fullLabel||p.label}</div>
        <div class="tt-row"><span class="k"><span class="sw" style="background:#3ba7ff"></span>Spend</span><span class="v">${fmtUSDfull(p.x)}</span></div>
        <div class="tt-row"><span class="k"><span class="sw" style="background:var(--green)"></span>Leads</span><span class="v">${fmtNum(p.y)}</span></div>`;
      tip.style.opacity=1;
      moveTip(tip,el2,(e.clientX-r.left)/r.width*el2.clientWidth,(e.clientY-r.top)/r.height*el2.clientHeight);});
  });
}

// ---- TAB 0: FUND OVERVIEW ----
function buildFund(){
  const p=document.getElementById("tab0");
  const gap=FUND.marketingFundRevenue.map((r,i)=>r-FUND.advertisingMarketing[i]);
  const pctOfRev=FUND.marketingFundRevenue.map((r,i)=>r/FUND.totalRevenue[i]*100);
  const totalCollected=sum(FUND.marketingFundRevenue), totalSpent=sum(FUND.advertisingMarketing);
  const lastGap=gap[gap.length-1];
  // ---- Year-over-Year comparison (2023 vs 2024 vs 2025) ----
  // Leads and closed deals come from the live CRM aggregates; annual spend from the fund income
  // statement (FUND.advertisingMarketing). Cost per lead is estimated as annual spend ÷ annual leads.
  const yoyYears=[2023,2024,2025];
  const yoyLeads=yoyYears.map(y=>(LEADS_BY_YEAR&&LEADS_BY_YEAR[y])||0);
  const yoyDeals=yoyYears.map(y=>(DEALS_BY_AWARD_YEAR&&DEALS_BY_AWARD_YEAR[y])||0);
  const yoySpend=yoyYears.map(y=>{const idx=FUND.years.indexOf(y);return idx>=0?FUND.advertisingMarketing[idx]:0;});
  const yoyConv=yoyYears.map((y,i)=>yoyLeads[i]?yoyDeals[i]/yoyLeads[i]*100:0);
  const yoyCPL=yoyYears.map((y,i)=>yoyLeads[i]?yoySpend[i]/yoyLeads[i]:0);
  const yoyMetrics=[
    {name:"Total Leads",     vals:yoyLeads, fmt:v=>fmtNum(Math.round(v)), better:"up"},
    {name:"Closed Deals",    vals:yoyDeals, fmt:v=>fmtNum(Math.round(v)), better:"up"},
    {name:"Conversion Rate", vals:yoyConv,  fmt:v=>fmtPct(v,2),           better:"up"},
    {name:"Est. Cost / Lead",vals:yoyCPL,   fmt:v=>fmtUSDfull(v),         better:"down"}
  ];
  const yoySeries=[{name:"2023",color:"#3ba7ff"},{name:"2024",color:"#b37feb"},{name:"2025",color:"#00e676"}];
  // % change cell — colored by whether the move is in the metric's "better" direction, not by raw sign
  const yoyChg=(base,cur,better)=>{
    if(base==null||base===0||cur==null)return `<td style="color:var(--dim)">—</td>`;
    const d=(cur-base)/base*100, good=better==="up"?d>0:d<0;
    const cls=Math.abs(d)<0.05?'':(good?'pos':'neg'), arrow=d>0.05?'▲':d<-0.05?'▼':'';
    return `<td class="${cls}" style="font-variant-numeric:tabular-nums">${arrow} ${d>0?'+':''}${d.toFixed(1)}%</td>`;
  };
  // ---- Network Alerts: auto-flag anomalies across fund, leads, channels & response time ----
  const fmtDays=(v,d=1)=>v.toFixed(d)+(Math.abs(v-1)<1e-9?" day":" days");
  const alerts=[];
  // 1) Cost-per-lead spike — any 2025 month whose net cost/lead is >2× the 2025 blended average (red)
  {
    let ySpend=0, yLeads=0; const rows=[];
    for(let m=1;m<=12;m++){
      const k=mkKey(2025,m), so=spendStore[k];
      const s=so?sum(Object.values(so)):0;
      const mo=RESPONSE.monthly&&RESPONSE.monthly[k]; const l=mo?mo.total:0;
      ySpend+=s; yLeads+=l; rows.push({m,spend:s,leads:l,cpl:l>0?s/l:0});
    }
    const avgCPL=yLeads>0?ySpend/yLeads:0;
    const spikes=rows.filter(o=>o.leads>0&&avgCPL>0&&o.cpl>2*avgCPL).sort((a,b)=>b.cpl-a.cpl);
    if(spikes.length){
      const w=spikes[0], more=spikes.length-1;
      alerts.push({level:"red",icon:"📈",headline:"Cost-per-lead spike",
        metric:`<b>${fmtUSDfull(w.cpl)}/lead</b> in ${MONTH_NAMES[w.m-1]} 2025 — ${(w.cpl/avgCPL).toFixed(1)}× the ${fmtUSDfull(avgCPL)} annual average${more>0?` (plus ${more} other month${more>1?'s':''} over 2×)`:''}`,
        action:`Audit ${MONTH_NAMES[w.m-1]}'s ${fmtUSD(w.spend)} spend against just ${fmtNum(w.leads)} leads — <b>pause or reallocate</b> the campaigns that ran hot without a matching lead lift.`});
    }
  }
  // 2) Marketing fund gap — 2025 collected−spent gap exceeding 20% of collections (yellow)
  {
    const yi=FUND.years.indexOf(2025)>=0?FUND.years.indexOf(2025):FUND.years.length-1;
    const collected=FUND.marketingFundRevenue[yi], spent=FUND.advertisingMarketing[yi];
    const g=collected-spent, pct=collected?Math.abs(g)/collected*100:0;
    if(collected&&pct>20){
      const over=g<0;
      alerts.push({level:"yellow",icon:"⚠️",headline:over?"Marketing fund overspend":"Marketing fund underspend",
        metric:`${over?'Spend exceeded collections by':'Collected−spent surplus of'} <b>${fmtUSD(Math.abs(g))}</b> in ${FUND.years[yi]} — ${fmtPct(pct,0)} of the ${fmtUSD(collected)} collected, past the 20% threshold`,
        action:over?`The fund is drawing down reserves — <b>rein in ad &amp; marketing spend</b> or raise franchisee contributions to bring the gap back under 20%.`:`Franchisee dollars are collected but sitting idle — <b>deploy the surplus</b> into demand generation or return it via rebate rather than letting the fund accumulate.`});
    }
  }
  // 3) "No Response" death rate — >60% of all leads dying on No Response (red)
  {
    const noResp=sum(Object.values(DEAD_BY_CHANNEL).map(r=>r["No Response"]||0));
    const tot=TOTAL_LEADS||sum(CHANNELS.map(c=>c.leads));
    const pct=tot?noResp/tot*100:0;
    if(pct>60){
      alerts.push({level:"red",icon:"📵",headline:"“No Response” is killing leads",
        metric:`<b>${fmtPct(pct,0)}</b> of leads — ${fmtNum(noResp)} of ${fmtNum(tot)} — die on “No Response,” above the 60% threshold`,
        action:`Stand up an <b>SDR speed-to-lead cadence and CRM auto-follow-up</b>. A small lift in follow-up beats any new top-of-funnel spend — the cheapest deal is the lead you already paid for.`});
    }
  }
  // 4) Channel underperformance — any channel with >100 leads and zero conversions (yellow)
  {
    const bad=CHANNELS.filter(c=>c.leads>100&&c.won===0).sort((a,b)=>b.leads-a.leads);
    if(bad.length){
      const w=bad[0], more=bad.length-1;
      alerts.push({level:"yellow",icon:"🚱",headline:"Channel converting nothing",
        metric:`<b>${w.name}</b> — ${fmtNum(w.leads)} leads, <b>0 conversions</b>${more>0?` (plus ${more} other channel${more>1?'s':''} over 100 leads with no closes)`:''}`,
        action:`High volume with zero closes points to a <b>targeting or lead-quality problem</b>, not a spend shortfall — qualify these leads harder or pause ${w.name} until quality improves.`});
    }
  }
  // 5) Response-time lag — any source averaging >10 days to first contact (red)
  {
    const lag=Object.entries(RESPONSE.bySource||{})
      .map(([s,b])=>({s,contacted:b.contacted,avg:b.contacted?b.sumDays/b.contacted:0}))
      .filter(o=>o.contacted>0&&o.avg>10).sort((a,b)=>b.avg-a.avg);
    if(lag.length){
      const w=lag[0], more=lag.length-1;
      alerts.push({level:"red",icon:"⏱️",headline:"Slow first-contact response",
        metric:`<b>${w.s}</b> averages <b>${fmtDays(w.avg)}</b> to first contact${more>0?` (plus ${more} other source${more>1?'s':''} over 10 days)`:''} — past the 10-day threshold`,
        action:`Route ${w.s} leads to an <b>immediate auto-response and same-day SDR touch</b>. Response speed tracks directly with which leads convert.`});
    }
  }
  const alertCardHTML=a=>`<div class="alert ${a.level}"><div class="ic">${a.icon}</div><div class="body">
       <div class="hl"><span class="tag">${a.level==="red"?"Critical":"Warning"}</span>${a.headline}</div>
       <div class="metric">${a.metric}</div>
       <div class="act">${a.act||a.action}</div></div></div>`;
  const alertsHTML=alerts.length
    ? `<div class="alerts">${alerts.map(alertCardHTML).join("")}</div>`
    : `<div class="alerts"><div class="alert green"><div class="ic">✅</div><div class="body">
         <div class="hl"><span class="tag">All Clear</span>No network alerts</div>
         <div class="metric">Every monitored threshold is within range — cost per lead, fund balance, “No Response” rate, channel conversion and speed-to-lead all check out.</div>
         <div class="act">These auto-checks re-run every time new spend or CRM data is uploaded.</div></div></div></div>`;
  p.innerHTML=`
   <div class="tab-head"><h2>Marketing Fund Overview</h2>
     <p>Consolidated Marketing Fund revenue (collected from franchisees) versus Advertising &amp; Marketing spend, 2020–2025. Source: XGA Consolidated Income Statement.</p></div>
   <div class="kpis">
     <div class="kpi"><div class="label">Fund Collected · 2025</div><div class="val g">${fmtUSD(FUND.marketingFundRevenue[5])}</div><div class="sub">vs ${fmtUSD(FUND.marketingFundRevenue[4])} in 2024</div></div>
     <div class="kpi alt"><div class="label">Ad &amp; Mktg Spend · 2025</div><div class="val">${fmtUSD(FUND.advertisingMarketing[5])}</div><div class="sub">down from ${fmtUSD(FUND.advertisingMarketing[4])} peak</div></div>
     <div class="kpi ${lastGap>=0?'':'bad'}"><div class="label">2025 Collected − Spent</div><div class="val ${lastGap>=0?'g':'r'}">${lastGap>=0?'+':''}${fmtUSD(lastGap)}</div><div class="sub">first surplus year</div></div>
     <div class="kpi pur"><div class="label">Fund as % of Revenue · 2025</div><div class="val">${fmtPct(pctOfRev[5])}</div><div class="sub">up from ${fmtPct(pctOfRev[0])} in 2020</div></div>
     <div class="kpi warn"><div class="label">6-Yr Cumulative Gap</div><div class="val r">${fmtUSD(totalCollected-totalSpent)}</div><div class="sub">${fmtUSD(totalCollected)} in / ${fmtUSD(totalSpent)} out</div></div>
   </div>
   <div class="alerts-head"><h3>Network Alerts</h3><span class="cnt">${alerts.length?`${alerts.length} condition${alerts.length>1?'s':''} flagged · auto-monitored`:'auto-monitored · updates with new data'}</span></div>
   ${alertsHTML}
   <div class="card">
     <h3>Fund Collected vs Marketing Spent</h3>
     <p class="csub">Both series in USD on a single axis · 2020–2025</p>
     <div id="fundLine"></div>

       <div class="item"><span class="swatch line" style="background:var(--green)"></span>Marketing Fund Revenue (collected)</div>
       <div class="item"><span class="swatch line" style="background:var(--c2)"></span>Advertising &amp; Marketing (spent)</div>
     </div>
   </div>
   <div class="grid2">
     <div class="card"><h3>Gap: Collected − Spent</h3><p class="csub">Positive = surplus · Negative = fund overspent</p><div id="fundGap"></div></div>
     <div class="card"><h3>Fund Collected as % of Total Franchise Revenue</h3><p class="csub">Marketing Fund revenue ÷ total consolidated revenue</p><div id="fundPct"></div></div>
   </div>
   <div class="card">
     <h3>Detail by Year</h3>
     <div class="tbl-scroll"><table class="tbl">
       <thead><tr><th>Year</th><th>Fund Collected</th><th>Ad &amp; Mktg Spend</th><th>Gap</th><th>Total Revenue</th><th>Fund % of Rev</th></tr></thead>
       <tbody>${FUND.years.map((y,i)=>`<tr>
         <td>${y}</td><td>${fmtUSDfull(FUND.marketingFundRevenue[i])}</td><td>${fmtUSDfull(FUND.advertisingMarketing[i])}</td>
         <td class="${gap[i]>=0?'pos':'neg'}">${gap[i]>=0?'+':''}${fmtUSDfull(gap[i])}</td>

     <div class="note"><b>Read:</b> Lead volume grew steadily — ${fmtNum(yoyLeads[0])} (2023) → ${fmtNum(yoyLeads[1])} (2024) → ${fmtNum(yoyLeads[2])} (2025) — and estimated cost per lead fell from ${fmtUSDfull(yoyCPL[0])} to ${fmtUSDfull(yoyCPL[2])} as spend was cut against a larger lead base. Conversion peaked in 2024 at ${fmtPct(yoyConv[1],2)} (${yoyDeals[1]} deals) before easing to ${fmtPct(yoyConv[2],2)} in 2025. Deals are attributed to the franchise-award year and leads to inquiry year; % change columns compare each year to the prior one.</div>

}

// ---- TAB 2: LEAD VOLUME VS SPEND ----
function buildLeadsSpend(){
  const p=document.getElementById("tab2");
  const names=Object.keys(ENTITIES);
  const spend=MONTHS.map((_,m)=>sum(names.map(n=>ENTITIES[n][m])));
  const cpl=MONTHS.map((_,i)=>LEADS_2025[i]?spend[i]/LEADS_2025[i]:0);
  const totLeads=sum(LEADS_2025), totSpend=sum(spend);
  const avgCPL=totLeads?totSpend/totLeads:0;
  const validCpl=cpl.filter(v=>v>0);
  const firstLead=LEADS_2025[0], lastLead=LEADS_2025[LEADS_2025.length-1];
  const trendPct=firstLead?(lastLead-firstLead)/firstLead*100:0;
  const rangeSub=SINGLE_YEAR?SINGLE_YEAR+" · "+MONTHS[0]+"–"+MONTHS[MONTHS.length-1]:MONTHS[0]+"–"+MONTHS[MONTHS.length-1];
  // ---- Spend vs Leads correlation: one point per month, least-squares regression + Pearson r ----
  const corrPts=MONTHS.map((m,i)=>({x:spend[i],y:LEADS_2025[i],label:MONTHS[i],fullLabel:MONTH_NAMES[i]?MONTH_NAMES[i]:MONTHS[i]}));
  const nC=corrPts.length;
  const mX=sum(spend)/nC, mY=sum(LEADS_2025)/nC;
  let sXY=0,sXX=0,sYY=0;
  corrPts.forEach(p=>{const dx=p.x-mX,dy=p.y-mY;sXY+=dx*dy;sXX+=dx*dx;sYY+=dy*dy;});
  const corrR=(sXX>0&&sYY>0)?sXY/Math.sqrt(sXX*sYY):0;
  const corrSlope=sXX>0?sXY/sXX:0, corrInt=mY-corrSlope*mX, corrR2=corrR*corrR;
  const absR=Math.abs(corrR);
  const strength=absR>=0.7?"strong":absR>=0.4?"moderate":absR>=0.2?"weak":"negligible";
  const dirWord=corrR>0.05?"positive":corrR<-0.05?"negative":"flat";
  // Callout framing: strong+ correlation reads as spend-linked; weak reads as independent.
  let coTag,coCls,coHead,coBody;
  if(absR<0.2){
    coTag="Independent";coCls="hold";coHead="Spend and leads move independently";
    coBody=`At <b>R = ${corrR.toFixed(2)}</b> there is essentially no linear relationship — only <b>${fmtPct(corrR2*100,0)}</b> of month-to-month lead variation tracks with spend. Lead volume is driven by seasonal demand, not by how much was spent that month, so simply increasing spend gives no reliable lift in inbound leads.`;
  }else if(corrR<0){
    coTag="Inverse";coCls="down";coHead="Higher-spend months produced fewer leads";
    coBody=`The trend line slopes <b>downward</b> (R = ${corrR.toFixed(2)}, a ${strength} negative correlation). Leads were front-loaded into Q1 when spend was lightest, while heavier H2 spend coincided with the seasonal decline — so spend is <b>not driving leads</b>; the two are moving in opposite directions because spend was timed against, not with, demand. Re-timing budget toward the high-intent early-year window is the lever, not more total spend.`;
  }else if(absR>=0.4){
    coTag="Spend-linked";coCls="up";coHead="More spend tracks with more leads";
    coBody=`The trend line slopes <b>upward</b> (R = ${corrR.toFixed(2)}, a ${strength} positive correlation) and spend explains about <b>${fmtPct(corrR2*100,0)}</b> of the month-to-month variation in leads. Higher-spend months do tend to deliver more leads — spend appears to be a genuine lead driver, so incremental budget is more likely to return incremental volume. Correlation is not proof of causation, but the relationship is directionally supportive.`;
  }else{
    coTag="Weakly linked";coCls="hold";coHead="A faint positive link, mostly noise";
    coBody=`R = ${corrR.toFixed(2)} is a ${strength} positive relationship — spend explains only <b>${fmtPct(corrR2*100,0)}</b> of lead variation. There is a slight tendency for higher-spend months to see more leads, but it is too weak to treat spend as a dependable lead lever; seasonal demand dominates.`;
  }
  p.innerHTML=`
   <div class="tab-head"><h2>Lead Volume vs Marketing Spend · ${SPEND_RANGE}</h2>
     <p>Monthly inbound franchise leads (Export.xlsx) aligned with monthly Advertising &amp; Marketing spend (P&amp;Ls), and the resulting cost per lead. Two measures on different scales are shown as aligned panels rather than a dual axis.</p></div>
   <div class="kpis">

    return ((cnts.Hot||0)*RATING_WEIGHTS.Hot+(cnts.Warm||0)*RATING_WEIGHTS.Warm+(cnts.Cold||0)*RATING_WEIGHTS.Cold)/rc;};
  const scoreGrade=s=>s==null?{label:"No ratings",cls:"mid"}:s>=80?{label:"High",cls:"good"}:s>=50?{label:"Medium",cls:"mid"}:{label:"Low",cls:"bad"};
  const qr=document.getElementById("qualRows");

    ovHot+=cnts.Hot||0; ovWarm+=cnts.Warm||0; ovCold+=cnts.Cold||0;
    const rc=ratedCount(cnts), score=qualityScore(cnts), gr=scoreGrade(score);

function convChart(el2,rows){
  const W=760,H=300,padL=64,padR=22,padT=18,padB=64;
  const data=rows.map(r=>r.conv);const mx=Math.max(...data,INDUSTRY_BENCHMARK);
  const {ticks,lo,hi}=niceTicks(0,mx,5);
  const xw=W-padL-padR,yh=H-padT-padB,n=data.length,slot=xw/n,bw=Math.min(52,slot*0.6);
  const X=i=>padL+slot*i+slot/2,Y=v=>padT+yh*(1-(v-lo)/(hi-lo));
  let g=`<svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet"><g class="grid">`;
  ticks.forEach(t=>{g+=`<line x1="${padL}" y1="${Y(t)}" x2="${W-padR}" y2="${Y(t)}"/>`;});
  g+='</g><g class="axis">';
  ticks.forEach(t=>{g+=`<text x="${padL-9}" y="${Y(t)+4}" text-anchor="end">${fmtPct(t,1)}</text>`;});
  rows.forEach((r,i)=>{g+=`<text x="${X(i)}" y="${H-40}" text-anchor="end" transform="rotate(-32 ${X(i)} ${H-40})">${r.name}</text>`;});
  g+='</g>';
  const y0=Y(0);
  rows.forEach((r,i)=>{const yv=Y(r.conv),c=r.conv>=INDUSTRY_BENCHMARK?"#00e676":"#ff5252";
    g+=`<rect class="bar" data-i="${i}" x="${X(i)-bw/2}" y="${yv}" width="${bw}" height="${Math.max(y0-yv,0.5)}" rx="3" fill="${c}" opacity="0.9"/>`;
    g+=`<text class="dlabel" x="${X(i)}" y="${yv-6}" text-anchor="middle">${fmtPct(r.conv,2)}</text>`;});
  g+=`<line class="bench-line" x1="${padL}" y1="${Y(INDUSTRY_BENCHMARK)}" x2="${W-padR}" y2="${Y(INDUSTRY_BENCHMARK)}"/>`;
  g+=`<text x="${W-padR}" y="${Y(INDUSTRY_BENCHMARK)-6}" text-anchor="end" fill="#ffb020" font-size="11" font-weight="600">2.5% benchmark</text>`;
  g+='</svg>';el2.innerHTML=g;el2.classList.add("chart-wrap");
  const svg=el2.querySelector("svg"),tip=attachTip(el2);
  svg.querySelectorAll(".bar").forEach(b=>{b.addEventListener("mousemove",e=>{const i=+b.dataset.i,r=svg.getBoundingClientRect();
    tip.innerHTML=`<div class="tt-title">${rows[i].name}</div><div class="tt-row"><span class="k">Conversion</span><span class="v">${fmtPct(rows[i].conv,2)}</span></div><div class="tt-row"><span class="k">Won / Leads</span><span class="v">${rows[i].won} / ${fmtNum(rows[i].leads)}</span></div>`;
    tip.style.opacity=1;moveTip(tip,el2,(e.clientX-r.left)/r.width*el2.clientWidth,(e.clientY-r.top)/r.height*el2.clientHeight);});
    b.addEventListener("mouseleave",()=>tip.style.opacity=0);});
}

// ---- TAB 4: COST PER CONVERSION ----
function buildCPC(){
  const p=document.getElementById("tab4");
  const idx=y=>FUND.years.indexOf(y);
  const spend2325=[2023,2024,2025].map(y=>FUND.advertisingMarketing[idx(y)]);
  const totalSpend=sum(spend2325);
  const costPerDeal=totalSpend/CLOSED_DEALS;
  const leads2325=sum([2023,2024,2025].map(y=>LEADS_BY_YEAR[y]));
  const cost3yrPerLead=totalSpend/leads2325;
  const convRate=CLOSED_DEALS/leads2325*100;
  // ---- Cost per conversion by year: annual Ad & Mktg spend ÷ deals awarded that same year ----
  // (The headline KPI above divides all 2023–25 spend by all 17 closes; this splits it per year.)
  const cpcYears=[2023,2024,2025];
  const cpcSpendY=cpcYears.map(y=>FUND.advertisingMarketing[idx(y)]);
  const cpcDealsY=cpcYears.map(y=>DEALS_BY_AWARD_YEAR[y]||0);
  const cpcCostY=cpcYears.map((y,i)=>cpcDealsY[i]?cpcSpendY[i]/cpcDealsY[i]:0);
  const cpcSeries=[{name:"2023",color:"#3ba7ff"},{name:"2024",color:"#b37feb"},{name:"2025",color:"#00e676"}];
  // Cost per conversion is lower-is-better: a fall is an improvement, a rise is a regression.
  const cpcTrend=(a,b)=>{
    if(!a||!b) return null;
    const d=(b-a)/a*100, good=d<0;
    return {d,good,label:good?"Improving":"Worsening",arrow:good?"▼":"▲"};
  };

// ---- Animated conversion funnel (Cost Per Conversion tab) ----
function buildFunnelAnim(el){
  if(!el)return;
  const IC=LEAD_STATUS["Intro Call"]||40, WON=CLOSED_DEALS||17;
  const stages=[
    {label:"Total Leads",  value:3192,               c:"#00e676"},
    {label:"Contacted",    value:LEAD_STATUS["Contacted"]||390, c:"#74e34a"},
    {label:"Nurture",      value:LEAD_STATUS["Nurture"]||373,   c:"#c2e021"},
    {label:"Intro Call",   value:IC,                 c:"#ffd23f"},
    {label:"Discovery",    value:Math.max(WON+3,Math.round(IC*0.85)), c:"#ffab2e", est:true},
    {label:"FDD Review",   value:Math.max(WON+2,Math.round(IC*0.70)), c:"#ff8534", est:true},
    {label:"Approved",     value:Math.max(WON+1,Math.round(IC*0.55)), c:"#ff5f3c", est:true},
    {label:"Closed / Won", value:WON,                c:"#ff3b30"}
  ];
  const maxV=stages[0].value, w=v=>(18+82*Math.pow(v/maxV,0.42)).toFixed(1);
  let h='<div class="fnl">';
  stages.forEach((s,i)=>{
    if(i>0){
      const prev=stages[i-1].value, drop=prev>0?(prev-s.value)/prev*100:0, bd=i*0.18+0.32;
      h+=`<div class="fnl-drop" style="--c:${stages[i-1].c}">`
        +`<span class="fnl-dot" style="left:calc(50% - 16px);animation-delay:${(i*0.13).toFixed(2)}s"></span>`
        +`<span class="fnl-dot" style="animation-delay:${(i*0.13+0.32).toFixed(2)}s"></span>`
        +`<span class="fnl-dot" style="left:calc(50% + 16px);animation-delay:${(i*0.13+0.64).toFixed(2)}s"></span>`
        +`<span class="fnl-drop-badge" style="transition-delay:${bd.toFixed(2)}s">↓ ${fmtPct(drop,1)} drop-off</span>`
        +`</div>`;
    }
    const d=(i*0.18).toFixed(2);
    h+=`<div class="fnl-stage"><div class="fnl-bar" style="--w:${w(s.value)}%;--c:${s.c};transition-delay:${d}s,${d}s">`
      +`<span class="fnl-name">${s.label}${s.est?' <b style="font-weight:800">*</b>':''}</span>`
      +`<span class="fnl-val">${fmtNum(s.value)}</span></div></div>`;
  });
  h+='</div>';el.innerHTML=h;
}

// ============================== CHART: CATEGORY BARS (per-bar color + value label) ==============================
function catBarChart(el2,{cats,yFmt=fmtNum,valLabel=(c)=>fmtNum(c.value),tipRows=(c)=>`<div class="tt-row"><span class="k">Value</span><span class="v">${fmtNum(c.value)}</span></div>`,height=290}){
  const W=760,H=height,padL=54,padR=18,padT=26,padB=40;
  const data=cats.map(c=>c.value);
  const {ticks,lo,hi}=niceTicks(0,Math.max(...data,1),5);
  const xw=W-padL-padR,yh=H-padT-padB,n=cats.length,slot=xw/n,bw=Math.min(66,slot*0.6);
  const X=i=>padL+slot*i+slot/2, Y=v=>padT+yh*(1-(v-lo)/(hi-lo));
  let g=`<svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet"><g class="grid">`;
  ticks.forEach(t=>{g+=`<line class="${t===0?'zero':''}" x1="${padL}" y1="${Y(t)}" x2="${W-padR}" y2="${Y(t)}"/>`;});
  g+='</g><g class="axis">';
  ticks.forEach(t=>{g+=`<text x="${padL-9}" y="${Y(t)+4}" text-anchor="end">${yFmt(t)}</text>`;});
  cats.forEach((c,i)=>{g+=`<text x="${X(i)}" y="${H-14}" text-anchor="middle">${c.label}</text>`;});
  g+='</g>';
  const y0=Y(0);
  cats.forEach((c,i)=>{const yv=Y(c.value);
    g+=`<rect class="bar" data-i="${i}" x="${X(i)-bw/2}" y="${yv}" width="${bw}" height="${Math.max(y0-yv,0.5)}" rx="3" fill="${c.color}" opacity="0.9"/>`;
    g+=`<text class="dlabel" x="${X(i)}" y="${yv-6}" text-anchor="middle">${valLabel(c)}</text>`;});
  g+='</svg>';el2.innerHTML=g;el2.classList.add("chart-wrap");
  const svg=el2.querySelector("svg"),tip=attachTip(el2);
  svg.querySelectorAll(".bar").forEach(b=>{
    b.addEventListener("mouseenter",()=>b.setAttribute("opacity","1"));
    b.addEventListener("mouseleave",()=>{b.setAttribute("opacity","0.9");tip.style.opacity=0;});
    b.addEventListener("mousemove",e=>{const i=+b.dataset.i,r=svg.getBoundingClientRect();
      tip.innerHTML=`<div class="tt-title">${cats[i].full||cats[i].label}</div>${tipRows(cats[i])}`;tip.style.opacity=1;
      moveTip(tip,el2,(e.clientX-r.left)/r.width*el2.clientWidth,(e.clientY-r.top)/r.height*el2.clientHeight);});
  });
}

// ---- TAB: RESPONSE TIME (speed-to-lead) ----
function buildResponse(){
  const p=document.getElementById("tab5");
  const R=RESPONSE;
  const fmtDays=(v,d=1)=>v.toFixed(d)+(Math.abs(v-1)<1e-9?" day":" days");
  const buckets=[...RESPONSE_BUCKETS,"never"];
  const avgAll=R.contactedCount?R.contactedSum/R.contactedCount:0;
  const avgConv=R.convContactedCount?R.convSum/R.convContactedCount:0;
  const avgDead=R.deadContactedCount?R.deadSum/R.deadContactedCount:0;
  const pctWithin7=R.total?R.within7Count/R.total*100:0;
  const pctNever=R.total?R.neverCount/R.total*100:0;
  const convAdv=avgDead-avgConv; // positive ⇒ converted leads reached faster

  // by-source rows
  const srcRows=CHANNEL_ORDER.filter(s=>R.bySource[s]&&R.bySource[s].leads>0).map((s,i)=>{
    const b=R.bySource[s];
    return {name:s, color:CHANNEL_COLORS[CHANNEL_ORDER.indexOf(s)]||"#6a6a6a",
      leads:b.leads, contacted:b.contacted, never:b.never,
      avg:b.contacted?b.sumDays/b.contacted:0, neverPct:b.leads?b.never/b.leads*100:0};
  }).sort((a,b)=>a.avg-b.avg);
  const measured=srcRows.filter(r=>r.contacted>=5); // avoid tiny-sample distortion in the callout
  const fastSrc=measured[0], slowSrc=measured[measured.length-1];

  // by-rating rows — is the team reaching higher-rated leads faster? (Hot ▸ Warm ▸ Cold ▸ Unrated)
  const rateRows=RATING_ORDER.map(rt=>{
    const b=(R.byRating&&R.byRating[rt])||{leads:0,contacted:0,never:0,sumDays:0};
    return {key:rt, name:rt, color:RATING_COLORS[rt]||"#6a6a6a",
      leads:b.leads, contacted:b.contacted, never:b.never,
      avg:b.contacted?b.sumDays/b.contacted:0, neverPct:b.leads?b.never/b.leads*100:0};
  });
  const rHot=rateRows.find(r=>r.key==="Hot");
  // "Prioritized correctly" = Hot leads reached at least as fast as every other rated tier that has
  // a real sample (≥5 contacted). Unrated is compared too, since fast-tracking unscored leads over
  // Hot ones is itself a prioritization miss.
  const rateCompare=rateRows.filter(r=>r.key!=="Hot"&&r.contacted>=5);
  const rHotAvg=rHot&&rHot.contacted>=5?rHot.avg:null;
  const fasterThanHot=rateCompare.filter(r=>rHotAvg!=null&&r.avg<rHotAvg-0.05); // tiers beating Hot on speed
  const prioritizedOK=rHotAvg!=null&&fasterThanHot.length===0;
  const hotShare=R.total&&rHot?rHot.leads/R.total*100:0;
  const rateCallout=(()=>{
    if(rHotAvg==null) return `<b>Read:</b> Too few Hot leads have a measured first-contact time (fewer than 5 contacted) to judge whether higher-rated leads are prioritized.`;
    if(prioritizedOK) return `<b>Read:</b> Prioritization looks right — <b>Hot</b> leads are first contacted in <b>${fmtDays(rHot.avg)}</b>, at least as fast as every other rated tier with a measurable sample. The quickest touches are landing on the highest-intent leads, which is exactly the intended behavior.`;
    const worst=fasterThanHot.slice().sort((a,b)=>a.avg-b.avg)[0];
    return `<b>Read:</b> Prioritization is <b>inverted</b> — <b>Hot</b> leads wait <b>${fmtDays(rHot.avg)}</b> for first contact, yet <b>${worst.name}</b> leads are reached faster at <b>${fmtDays(worst.avg)}</b>. Higher intent should earn a quicker touch, not a slower one. Compounding this, <b>${fmtPct(hotShare,0)}</b> of all leads are tagged <b>Hot</b>, so the rating field is barely functioning as a triage signal — when nearly every lead is "top priority," none effectively is. Reserve the Hot flag for genuinely high-intent leads and route them to the front of the contact queue.`;
  })();

  // monthly trend
  const mKeys=Object.keys(R.monthly).sort();
  const mLabel=k=>{const [y,m]=k.split("-");return MONTH_NAMES[+m-1]+" '"+y.slice(2);};
  const mAvg=mKeys.map(k=>{const m=R.monthly[k];return m.contacted?m.sumDays/m.contacted:0;});
  const mNeverPct=mKeys.map(k=>{const m=R.monthly[k];return m.total?m.never/m.total*100:0;});
  // worst/best responding month among those with a real contacted sample
  const monthStats=mKeys.map((k,i)=>({k,avg:mAvg[i],contacted:R.monthly[k].contacted})).filter(o=>o.contacted>=5);
  const slowMonth=monthStats.slice().sort((a,b)=>b.avg-a.avg)[0];
  const recent=monthStats.slice(-3);
  const recentAvg=recent.length?sum(recent.map(o=>o.avg))/recent.length:0;

  p.innerHTML=`
   <div class="tab-head"><h2>Response Time · Speed-to-Lead</h2>
     <p>How fast inbound leads are contacted after inquiry, and whether faster response correlates with conversion. Measured as whole days from <b>Inquiry Date</b> to <b>First Contacted</b> in Export.xlsx (${fmtNum(R.total)} leads); leads with no First Contacted date are counted as <b>never contacted</b>.</p></div>
   <div class="kpis">
     <div class="kpi"><div class="label">Avg Days to First Contact</div><div class="val">${fmtDays(avgAll)}</div><div class="sub">across ${fmtNum(R.contactedCount)} contacted leads</div></div>
     <div class="kpi alt"><div class="label">Converted vs Dead — Avg Response</div><div class="val g">${fmtDays(avgConv)}</div><div class="sub">converted · vs <b>${fmtDays(avgDead)}</b> for dead leads</div></div>
     <div class="kpi ${pctWithin7>=50?'':'warn'}"><div class="label">Contacted Within 7 Days</div><div class="val">${fmtPct(pctWithin7,1)}</div><div class="sub">${fmtNum(R.within7Count)} of ${fmtNum(R.total)} leads</div></div>
     <div class="kpi bad"><div class="label">Never Contacted</div><div class="val r">${fmtPct(pctNever,1)}</div><div class="sub">${fmtNum(R.neverCount)} leads with no first contact</div></div>
   </div>
   <div class="grid2">
